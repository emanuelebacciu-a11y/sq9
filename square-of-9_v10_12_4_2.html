<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:#0f0f13;color:#f0f0f0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;height:100%;overflow:hidden;}
.app{display:flex;flex-direction:column;height:100dvh;max-width:600px;margin:0 auto;}
.backup-bar{display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:6px 14px;background:#0a0a0e;border-bottom:1px solid #1a1a22;flex-shrink:0;}
.bkp-btn{display:flex;align-items:center;gap:5px;background:#1a1a24;border:1.5px solid #2a2a3a;border-radius:10px;padding:6px 12px;font-size:11px;font-weight:800;color:#777;cursor:pointer;letter-spacing:.3px;transition:all .15s;-webkit-tap-highlight-color:transparent;}
.bkp-btn:active{background:#252535;color:#ccc;border-color:#444;}
.bkp-btn.export{border-color:#2a4a2a;color:#6ac46a;}
.bkp-btn.export:active{background:#0d2a0d;}
.bkp-btn.import{border-color:#2a3a5a;color:#6fa3e0;}
.bkp-btn.import:active{background:#0d1f3c;}
.bkp-icon{font-size:13px;}
.header{padding:12px 16px 8px;background:#0f0f13;border-bottom:1px solid #1e1e28;flex-shrink:0;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.app-title{font-size:13px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#555;}
.pivot-display{display:flex;align-items:center;gap:8px;}
.pivot-label{font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.8px;}
.pivot-value{font-size:22px;font-weight:800;color:#e05555;font-variant-numeric:tabular-nums;letter-spacing:-0.5px;}
.pivot-value.empty{color:#333;font-size:16px;}
.pivot-input-row{display:flex;gap:8px;align-items:center;}
.pivot-input{flex:1;background:#1a1a24;border:2px solid #e05555;border-radius:12px;padding:10px 14px;font-size:18px;font-weight:700;color:#e05555;outline:none;width:100%;}
.pivot-input::placeholder{color:#442222;font-weight:400;}
.nat-sq-btn{background:#1a1a24;border:1.5px solid #333;border-radius:10px;padding:9px 12px;color:#888;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s;}
.nat-sq-btn:active{background:#252530;color:#ccc;}
.nat-sq-hint{font-size:10px;color:#555;margin-top:5px;padding-left:2px;min-height:14px;}
/* inline pivot anchor toggle */
.piv-anchor{display:flex;align-items:center;gap:3px;flex-shrink:0;}
.piv-anchor-lbl{font-size:9px;font-weight:900;color:#333;transition:color .15s;line-height:1;}
.piv-anchor-lbl.on{color:#e05555;}
.piv-anchor-sw{position:relative;width:30px;height:16px;cursor:pointer;flex-shrink:0;}
.piv-anchor-sw input{opacity:0;width:0;height:0;position:absolute;}
.piv-anchor-track{position:absolute;inset:0;background:#1a1a24;border-radius:8px;border:1px solid #2a2a3a;transition:border-color .15s;}
.piv-anchor-thumb{position:absolute;top:3px;left:3px;width:8px;height:8px;background:#444;border-radius:50%;transition:all .15s;}
.piv-anchor-sw input:checked + .piv-anchor-track{border-color:#e05555;}
.piv-anchor-sw input:checked + .piv-anchor-track + .piv-anchor-thumb{background:#e05555;transform:translateX(14px);}

/* tabs */
.tabs{display:flex;background:#0f0f13;border-bottom:1px solid #1e1e28;flex-shrink:0;}
.tab{flex:1;padding:10px;text-align:center;font-size:12px;font-weight:700;letter-spacing:.5px;color:#444;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;text-transform:uppercase;}
.tab.active{color:#e05555;border-bottom-color:#e05555;}
/* filters */
.filters{padding:8px 12px;background:#0d0d11;border-bottom:1px solid #1a1a22;flex-shrink:0;transition:transform .25s ease;}
.filter-row{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.filter-label{font-size:9px;font-weight:700;color:#444;text-transform:uppercase;letter-spacing:.8px;margin-right:2px;}
.fbtn{border:1.5px solid transparent;border-radius:8px;padding:5px 10px;font-size:11px;font-weight:800;cursor:pointer;transition:all .12s;letter-spacing:.3px;}
.fbtn.off{opacity:.22;filter:grayscale(1);}
.fb-all{background:#1e1e28;color:#aaa;border-color:#333;}
.fb-90{background:#0d1f3c;color:#6fa3e0;border-color:#2a4a7a;}
.fb-45{background:#0d2a0d;color:#6ac46a;border-color:#2a6a2a;}
.fb-225{background:#2a1f00;color:#d4a030;border-color:#6a4a00;}
.fb-1125{background:#1a0d2a;color:#a07add;border-color:#5a2a8a;}
.fb-5625{background:#2a0d1a;color:#d06090;border-color:#7a2a4a;}
.sep{width:1px;height:20px;background:#222;margin:0 2px;}
.legend-bar{padding:6px 14px;background:#0d0d11;border-bottom:1px solid #1a1a22;display:flex;gap:14px;flex-wrap:wrap;flex-shrink:0;}
.leg{display:flex;align-items:center;gap:4px;font-size:9px;color:#555;}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
/* content */
.content{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0;}
.tab-pane{display:none;flex:1;overflow-y:auto;flex-direction:column;-webkit-overflow-scrolling:touch;}
.tab-pane.active{display:flex;}
.tab-pane::-webkit-scrollbar{width:3px;}
.tab-pane::-webkit-scrollbar-thumb{background:#2a2a38;border-radius:3px;}
.empty-msg{padding:50px 20px;text-align:center;color:#333;font-size:14px;line-height:1.8;}
.empty-msg strong{display:block;font-size:28px;margin-bottom:10px;color:#252530;}
/* level rows */
.lv-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid #13131a;gap:10px;transition:background .1s;border-left:3px solid transparent;border-right:2px solid transparent;cursor:pointer;}
.lv-row:active{background:#1a1a24;}
.lv-row.is-pivot{background:#1a0a0a;border-left:3px solid #e05555;}
.lv-row.rev-whole{background:#191400;border-left:4px solid #f0b400;}
.lv-row.rev-half{background:#00101e;border-left:4px solid #4a9eff;}
.lv-row.rev-quarter{background:#001800;border-left:3px solid #4acc4a;}
.lv-row.perf-sq{border-right:3px solid #9933cc;}
.lv-row.rev-whole.perf-sq{background:#1a1100;border-left:4px solid #ffaa00;border-right:3px solid #9933cc;}
.lv-row.rev-half.perf-sq{background:#00101f;border-left:4px solid #0099ff;border-right:3px solid #9933cc;}
.lv-row.rev-quarter.perf-sq{background:#001900;border-left:3px solid #33cc33;border-right:3px solid #9933cc;}
.lv-row.pinned-row{background:#001a1a!important;border-left:4px solid #00e5e5!important;box-shadow:inset 0 0 0 1px #004444;}
.lv-row.pinned-row .lv-price{color:#00e5e5!important;}
.lv-price{font-size:18px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-0.5px;min-width:95px;}
.lv-price.c90{color:#6fa3e0;}
.lv-price.c45{color:#6ac46a;}
.lv-price.c225{color:#d4a030;}
.lv-price.c1125{color:#a07add;}
.lv-price.c5625{color:#d06090;}
.lv-price.cpiv{color:#e05555;}
.lv-meta{flex:1;display:flex;flex-direction:column;gap:2px;overflow:hidden;}
.lv-degs{font-size:11px;color:#555;font-variant-numeric:tabular-nums;white-space:nowrap;}
.lv-revs{font-size:10px;color:#3a3a4a;font-variant-numeric:tabular-nums;white-space:nowrap;}
.lv-tags{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.tag{display:inline-block;border-radius:5px;padding:2px 6px;font-size:9px;font-weight:900;letter-spacing:.4px;white-space:nowrap;}
.tag-90{background:#0d1f3c;color:#6fa3e0;border:1px solid #2a4a7a;}
.tag-45{background:#0d2a0d;color:#6ac46a;border:1px solid #2a6a2a;}
.tag-225{background:#2a1f00;color:#d4a030;border:1px solid #6a4a00;}
.tag-1125{background:#1a0d2a;color:#a07add;border:1px solid #5a2a8a;}
.tag-5625{background:#2a0d1a;color:#d06090;border:1px solid #7a2a4a;}
.tag-piv{background:#2a0d0d;color:#e05555;border:1px solid #5a1a1a;}
.tag-whole{background:#f0b400;color:#000;}
.tag-half{background:#4a9eff;color:#000;}
.tag-qrt{background:#4acc4a;color:#000;}
.tag-sq{background:#9933cc;color:#fff;}
.tag-pin{background:#004444;color:#00e5e5;border:1px solid #00aaaa;}

/* global settings switch bar */
.global-settings-bar{display:flex;align-items:center;gap:7px;padding:5px 14px;background:#0a0a0e;border-bottom:1px solid #1a1a22;flex-shrink:0;min-height:32px;}
.global-settings-label{font-size:9px;font-weight:700;color:#444;text-transform:uppercase;letter-spacing:1px;flex-shrink:0;}
.global-price-wrap{flex:1;min-width:0;}
.global-price-input{background:transparent;border:none;border-bottom:1px solid #2a2a3a;border-radius:0;padding:2px 4px;font-size:15px;font-weight:800;color:#e05555;outline:none;width:100%;font-variant-numeric:tabular-nums;-moz-appearance:textfield;}
.global-price-input::-webkit-outer-spin-button,.global-price-input::-webkit-inner-spin-button{-webkit-appearance:none;}
.global-price-input::placeholder{color:#2a2a3a;font-size:12px;font-weight:400;}
.global-price-input:focus{border-bottom-color:#e05555;}
.gsw-sep{width:1px;height:16px;background:#222;flex-shrink:0;margin:0 2px;}
.gsw{position:relative;width:34px;height:18px;cursor:pointer;flex-shrink:0;}
.gsw input{opacity:0;width:0;height:0;position:absolute;}
.gsw-track{position:absolute;inset:0;background:#1a1a24;border-radius:9px;border:1px solid #2a2a3a;transition:border-color .15s;}
.gsw-thumb{position:absolute;top:3px;left:3px;width:10px;height:10px;background:#333;border-radius:50%;transition:all .15s;}
.gsw input:checked + .gsw-track{border-color:#555;}
.gsw input:checked + .gsw-track + .gsw-thumb{background:#888;transform:translateX(16px);}
/* settings toggle button (kept for compat) */
.settings-toggle{display:none;}
/* grid */
.grid-controls{padding:10px 12px;background:#0d0d11;border-bottom:1px solid #1a1a22;flex-shrink:0;}
.ctrl-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;}
.ctrl-field{display:flex;flex-direction:column;gap:4px;}
.ctrl-label{font-size:9px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.5px;}
.ctrl-input{background:#1a1a24;border:1.5px solid #2a2a38;border-radius:8px;padding:7px 10px;font-size:14px;color:#ccc;outline:none;width:80px;-moz-appearance:textfield;}
.ctrl-input::-webkit-outer-spin-button,.ctrl-input::-webkit-inner-spin-button{-webkit-appearance:none;}
.ctrl-input:focus{border-color:#444;}
.rot-row{flex:1;min-width:110px;}
.rot-row input[type=range]{width:100%;accent-color:#e05555;margin-top:2px;}
.rot-val{color:#e05555;font-weight:700;}
.grid-wrap{flex:1;overflow:auto;padding:6px;}
.grid-svg-wrap{width:100%;aspect-ratio:1;}
.grid-svg-wrap svg{width:100%;height:100%;display:block;}

/* ── CONFLUENZE ── */
.conf-header{padding:10px 14px 8px;background:#0d0d11;border-bottom:1px solid #1a1a22;flex-shrink:0;}
.conf-pivots-section{padding:10px 14px;border-bottom:1px solid #1a1a22;}
.conf-section-title{font-size:9px;font-weight:800;color:#444;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.conf-pivot-list{display:flex;flex-direction:column;gap:6px;}
.conf-pivot-row{display:flex;align-items:center;gap:8px;}
.conf-pivot-input{flex:1;background:#14141e;border:1.5px solid #2a2a3a;border-radius:9px;padding:8px 12px;font-size:15px;font-weight:700;color:#ccc;outline:none;transition:border-color .15s;}
.conf-pivot-input::placeholder{color:#2a2a3a;font-weight:400;font-size:13px;}
.conf-pivot-input:focus{border-color:#555;color:#eee;}
.conf-pivot-input.macro{border-color:#6a4a00;color:#d4a030;background:#100c00;}
.conf-pivot-input.macro::placeholder{color:#3a2800;}
.conf-pivot-input.macro:focus{border-color:#a07020;}
.conf-pivot-input.micro-style{border-color:#2a4a7a;color:#6fa3e0;background:#040d1a;}
.conf-pivot-input.micro-style::placeholder{color:#1a3050;}
.conf-pivot-input.micro-style:focus{border-color:#4a7aba;}
.conf-pivot-badge{font-size:9px;font-weight:900;padding:4px 8px;border-radius:6px;white-space:nowrap;letter-spacing:.4px;}
.badge-macro{background:#2a1f00;color:#d4a030;border:1.5px solid #6a4a00;}
.badge-micro{background:#0d1f3c;color:#6fa3e0;border:1.5px solid #2a4a7a;}
.conf-pivot-del{width:24px;height:24px;border-radius:50%;background:transparent;border:1.5px solid #222;color:#333;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s;flex-shrink:0;}
.conf-pivot-del:active{border-color:#555;color:#888;}
.conf-add-row{display:flex;gap:8px;margin-top:8px;}
.conf-add-btn{flex:1;padding:8px;border-radius:9px;font-size:11px;font-weight:800;cursor:pointer;border:1.5px dashed;background:transparent;transition:all .15s;letter-spacing:.4px;text-transform:uppercase;}
.conf-add-macro{color:#d4a030;border-color:#6a4a00;}
.conf-add-macro:active{background:#1a1200;border-style:solid;}
.conf-add-micro{color:#6fa3e0;border-color:#2a4a7a;}
.conf-add-micro:active{background:#0d1f3c;border-style:solid;}
/* toggle micro from pages */
.conf-toggle-row{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid #1a1a22;flex-shrink:0;}
.conf-toggle-label{font-size:11px;color:#555;flex:1;}
.toggle-sw{position:relative;width:38px;height:22px;cursor:pointer;}
.toggle-sw input{opacity:0;width:0;height:0;}
.toggle-track{position:absolute;inset:0;background:#1a1a24;border-radius:11px;border:1.5px solid #2a2a3a;transition:background .2s;}
.toggle-thumb{position:absolute;top:3px;left:3px;width:14px;height:14px;background:#444;border-radius:50%;transition:all .2s;}
.toggle-sw input:checked+.toggle-track{background:#1a1a24;border-color:#e05555;}
.toggle-sw input:checked~.toggle-thumb,.toggle-sw input:checked+.toggle-track+.toggle-thumb{background:#e05555;transform:translateX(16px);}
/* soglia */
.conf-soglia-row{display:flex;gap:6px;align-items:center;padding:8px 14px;border-bottom:1px solid #1a1a22;flex-shrink:0;flex-wrap:wrap;}
.conf-soglia-label{font-size:9px;font-weight:700;color:#444;text-transform:uppercase;letter-spacing:.8px;margin-right:2px;}
.sbtn{border:1.5px solid transparent;border-radius:8px;padding:5px 10px;font-size:11px;font-weight:800;cursor:pointer;transition:all .12s;}
.sbtn.off{opacity:.3;}
.sb-g{background:#002200;color:#4acc4a;border-color:#2a5a2a;}
.sb-y{background:#221a00;color:#d4a030;border-color:#5a4400;}
.sb-o{background:#220e00;color:#e07020;border-color:#5a2e00;}
/* confluenze cards */
.conf-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 0;}
.conf-list::-webkit-scrollbar{width:3px;}
.conf-list::-webkit-scrollbar-thumb{background:#2a2a38;border-radius:3px;}
.conf-card{margin:0 10px 10px;border-radius:12px;overflow:hidden;border:1px solid #1e1e28;}
.conf-card.grade-g{border-color:#1a4a1a;box-shadow:0 0 0 1px #1a4a1a;}
.conf-card.grade-y{border-color:#4a3a00;box-shadow:0 0 0 1px #4a3a00;}
.conf-card.grade-o{border-color:#4a2000;box-shadow:0 0 0 1px #4a2000;}
.conf-card-header{display:flex;align-items:center;gap:10px;padding:10px 14px 8px;background:#111118;}
.conf-card.grade-g .conf-card-header{background:#0a1a0a;}
.conf-card.grade-y .conf-card-header{background:#1a1200;}
.conf-card.grade-o .conf-card-header{background:#1a0a00;}
.conf-price-big{font-size:20px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:-0.5px;}
.conf-card.grade-g .conf-price-big{color:#4acc4a;}
.conf-card.grade-y .conf-price-big{color:#d4a030;}
.conf-card.grade-o .conf-price-big{color:#e07020;}
.conf-stars{display:flex;gap:3px;align-items:center;margin-left:auto;}
.star{font-size:11px;}
.star.macro{color:#d4a030;}
.star.micro{color:#6fa3e0;}
.conf-dir{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;background:#1a1a24;color:#555;}
.conf-dir.sup{color:#4acc4a;background:#002200;}
.conf-dir.res{color:#e05555;background:#1a0a0a;}
.conf-dir.mix{color:#d4a030;background:#1a1200;}
/* badge vibrazione e angoli nelle confluenze */
.conf-vibr-badge{display:inline-flex;align-items:center;border-radius:5px;padding:2px 6px;font-size:9px;font-weight:900;letter-spacing:.3px;white-space:nowrap;flex-shrink:0;}
.conf-vibr-full{background:#1a1200;color:#d4a030;border:1px solid #6a4a00;}
.conf-vibr-frac{background:#0d0d11;color:#6a6a3a;border:1px solid #3a3a1a;}
.conf-vibr-8th{background:#0d0d11;color:#444422;border:1px solid #2a2a14;}
.conf-pivot-lines{padding:6px 14px 10px;background:#0d0d11;display:flex;flex-direction:column;gap:5px;}
.conf-pline{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid #111118;}
.conf-pline:last-child{border-bottom:none;}
.conf-pline-name{font-size:10px;font-weight:800;min-width:68px;padding-top:1px;}
.conf-pline-name.macro{color:#d4a030;}
.conf-pline-name.micro{color:#6fa3e0;}
.conf-pline-tags{display:flex;flex-wrap:wrap;gap:3px;flex:1;}
.conf-pline-prices{display:flex;flex-direction:column;align-items:flex-end;gap:1px;flex-shrink:0;min-width:64px;}
.cpp-exact{font-size:10px;font-weight:700;color:#555;font-variant-numeric:tabular-nums;}
.cpp-delta{font-size:9px;font-weight:800;font-variant-numeric:tabular-nums;}
.cpp-delta.pos{color:#4acc4a;}
.cpp-delta.neg{color:#e05555;}
.conf-ptag{display:inline-block;border-radius:4px;padding:2px 5px;font-size:9px;font-weight:800;white-space:nowrap;}
.cpt-90{background:#0d1f3c;color:#6fa3e0;border:1px solid #2a4a7a;}
.cpt-45{background:#0d2a0d;color:#6ac46a;border:1px solid #2a6a2a;}

<div class="app">
  <!-- Setup overlay -->
  <div id="setupOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;flex-direction:column;align-items:center;justify-content:center;padding:24px;">
    <div style="max-width:400px;width:100%;background:#13131e;border-radius:18px;padding:24px;border:1px solid #2a2a3a;">
      <div style="font-size:20px;font-weight:900;color:#e05555;margin-bottom:6px;">☁️ Setup Google Sheets</div>
      <div style="font-size:12px;color:#888;margin-bottom:20px;line-height:1.6;">
        Per la memoria infinita hai bisogno di un Google Apps Script.<br>
        Segui le istruzioni nel file <strong style="color:#aaa;">sq9_apps_script.gs</strong>, poi incolla qui l'URL.
      </div>
      <div style="font-size:10px;font-weight:800;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">URL Web App</div>
      <input id="sheetsUrlInput" type="url" placeholder="https://script.google.com/macros/s/..." 
        style="width:100%;background:#0f0f18;border:2px solid #2a2a3a;border-radius:10px;padding:10px 12px;font-size:13px;color:#e0e0e0;outline:none;margin-bottom:14px;box-sizing:border-box;"
        oninput="this.style.borderColor=this.value.includes('script.google.com')?'#e05555':'#2a2a3a'">
      <button onclick="saveSheetsUrl()" style="width:100%;background:#e05555;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:800;color:#fff;cursor:pointer;margin-bottom:10px;">Connetti →</button>
      <button onclick="document.getElementById('setupOverlay').style.display='none'" style="width:100%;background:transparent;border:1px solid #2a2a3a;border-radius:10px;padding:10px;font-size:12px;font-weight:700;color:#555;cursor:pointer;">Salta per ora</button>
    </div>

  <div class="pages-wrap" id="pagesWrap"></div>
</div>

<script>
// PAGE TEMPLATE
// ═══════════════════════════════════════════════════════════
function buildPageHTML(pgId) {
  // IDs are suffixed with pgId so each page is independent
  return `
  <div class="global-settings-bar" id="globalSettingsBar_${pgId}">
    <span class="global-settings-label" id="globalPriceLbl_${pgId}">Prezzo</span>
    <div class="global-price-wrap" id="globalPriceWrap_${pgId}">
      <input class="global-price-input" id="globalPriceInput_${pgId}" type="number" inputmode="decimal" placeholder="—"
        oninput="onGlobalPriceInput(${pgId})" onkeydown="if(event.key==='Enter')this.blur()">

// ═══════════════════════════════════════════════════════════
// PAGE STATE
// ═══════════════════════════════════════════════════════════
let pages = {};        // {pgId: {sel, currentGrid, customPivot, pinnedPrices, confPins, activeSteps, showAll, currentTab, confPivots, sogliaActive}}
let activePgId = null;
let pgCounter = 0;
const STEP_IDS = ['90','45','225','1125','5625'];

// Shared state (Confluenze macro pivots are per-page)
// microPivots are global (shared across pages — to use from confluenze sidebar)
let globalMicroPivots = []; // [{id, value, name}]

function pgState(pgId) { return pages[pgId]; }
function getPivot(pgId) {
  const s = pgState(pgId);
  if(!s) return null;
  if(s.customPivot !== null) return s.customPivot;
  if(s.sel && s.currentGrid) return s.currentGrid[s.sel.r][s.sel.c];
  return null;
}

// ── PERSISTENCE ────────────────────────────────────────────────────────────
function saveAll() {
  try {
    const pagesData = {};
    Object.entries(pages).forEach(function(entry) {
      var id = entry[0]; var s = entry[1];
      pagesData[id] = {
        customPivot: s.customPivot,
        pinnedPrices: [...(s.pinnedPrices||[])],
        confPins: [...(s.confPins||[])],
        activeSteps: [...s.activeSteps],
        showAll: s.showAll,
        currentTab: s.currentTab,
        confPivots: s.confPivots.filter(p=>p.source==='manual').map(p=>({...p})),
        sogliaActive: [...s.sogliaActive],
        label: s.label || null,
        confRange: s.confRange || {min:null,max:null},
        includedPageIds: s.includedPageIds || null,
        includedAngoliPageIds: s.includedAngoliPageIds || null,
        natsqMin: s.natsqMin, natsqMax: s.natsqMax, natsqFilters: [...(s.natsqFilters||[])], natsqPins: [...(s.natsqPins||[])],
        angoliOrigin: s.angoliOrigin, angoliCurrent: s.angoliCurrent, angoliTime: s.angoliTime||10, angoliDir: s.angoliDir||'up',
        angoliSubPages: (angoliSubPages[id]||[]).map(sub=>({...sub})),
        angoliActiveSubPage: angoliActiveSubPage[id]||null,
        angoliSubCounter: angoliSubCounter[id]||0,
        vibrHigh: s.vibrHigh, vibrLow: s.vibrLow, vibrCurrent: s.vibrCurrent, vibrPins: [...(s.vibrPins||[])],
        cicliSubPages: (cicliSubPages[id]||[]).map(sub=>({...sub,cicliFilters:[...(sub.cicliFilters||[])]})),
        cicliActiveSubPage: cicliActiveSubPage[id]||null,
        cicliSubCounter: cicliSubCounter[id]||0,
      };
    });
    localStorage.setItem('sq9v2_pages', JSON.stringify(pagesData));
    localStorage.setItem('sq9v2_active', String(activePgId));
    localStorage.setItem('sq9v2_counter', String(pgCounter));
    localStorage.setItem('sq9v2_micro', JSON.stringify(globalMicroPivots));
    scheduleSync();
  } catch(e) { alert('saveAll error: ' + e.message); }
}

function loadAll() {
  try {
    const raw = localStorage.getItem('sq9v2_pages');
    const micro = localStorage.getItem('sq9v2_micro');
    if(micro) globalMicroPivots = JSON.parse(micro);
    if(!raw) return false;
    const pagesData = JSON.parse(raw);
    const savedCounter = parseInt(localStorage.getItem('sq9v2_counter')||'0');
    const savedActive = parseInt(localStorage.getItem('sq9v2_active')||'0');
    pgCounter = savedCounter;
    Object.entries(pagesData).forEach(function(entry) {
      var id = entry[0]; var data = entry[1];
      const pgId = parseInt(id);
      createPageDOM(pgId);
      const s = pages[pgId];
      s.customPivot = data.customPivot || null;
      // migrate old single pinnedPrice → array
      s.pinnedPrices = data.pinnedPrices ? [...data.pinnedPrices] : (data.pinnedPrice!=null ? [data.pinnedPrice] : []);
      s.confPins = data.confPins ? [...data.confPins] : [];
      s.activeSteps = new Set(data.activeSteps || STEP_IDS);
      s.showAll = data.showAll !== false;
      s.currentTab = data.currentTab || 'levels';
      s.confPivots = (data.confPivots || []).map(p=>({
        ...p,
        anchorMode: p.anchorMode||'X',
        value: p.value!=null ? Number(p.value) : null,
        label: p.label || (p.value!=null ? String(Number(p.value)) : ''),
      }));
      s.sogliaActive = new Set(data.sogliaActive || ['g','y','o']);
      s.label = data.label || null;
      s.confRange = data.confRange || {min:null,max:null};
      s.includedPageIds = data.includedPageIds || null;
      s.includedAngoliPageIds = data.includedAngoliPageIds || null;
      s.natsqMin = data.natsqMin || null; s.natsqMax = data.natsqMax || null;
      s.natsqFilters = new Set(data.natsqFilters || ['sq','half','qrt']);
      s.natsqPins = data.natsqPins || [];
      s.angoliOrigin = data.angoliOrigin || null; s.angoliCurrent = data.angoliCurrent || null;
      s.angoliTime = data.angoliTime || 10; s.angoliDir = data.angoliDir || 'up';
      // Angoli multi-page restore
      angoliSubPages[id]=[];
      angoliSubCounter[id]=data.angoliSubCounter||0;
      angoliActiveSubPage[id]=data.angoliActiveSubPage||null;
      s.vibrHigh = data.vibrHigh || null; s.vibrLow = data.vibrLow || null;
      s.vibrCurrent = data.vibrCurrent || null; s.vibrPins = data.vibrPins || [];
      // Cicli sub-pages restore (avviene dopo nell'init block)
      cicliSubPages[id]=[];
      cicliSubCounter[id]=data.cicliSubCounter||0;
      cicliActiveSubPage[id]=data.cicliActiveSubPage||null;
      // Restore natsq inputs
      if(s.natsqMin!=null){const el=document.getElementById('natsqMin_'+pgId);if(el)el.value=s.natsqMin;}
      if(s.natsqMax!=null){const el=document.getElementById('natsqMax_'+pgId);if(el)el.value=s.natsqMax;}
      if(s.angoliOrigin!=null){const el=document.getElementById('angoliOrigin_'+pgId);if(el)el.value=s.angoliOrigin;}
      if(s.angoliCurrent!=null){const el=document.getElementById('angoliCurrent_'+pgId);if(el)el.value=s.angoliCurrent;}
      if(s.angoliTime!=null){const el=document.getElementById('angoliTime_'+pgId);if(el)el.value=s.angoliTime;}
      if(s.vibrHigh!=null){const el=document.getElementById('vibrHigh_'+pgId);if(el)el.value=s.vibrHigh;}
      if(s.vibrLow!=null){const el=document.getElementById('vibrLow_'+pgId);if(el)el.value=s.vibrLow;}
      if(s.vibrCurrent!=null){
        const el=document.getElementById('vibrCurrent_'+pgId);if(el)el.value=s.vibrCurrent;
        const gel=document.getElementById('globalPriceInput_'+pgId);if(gel)gel.value=s.vibrCurrent;
      }
      // cicliDate restore: gestito per sotto-pagina in newCicliPage()
      if(s.customPivot) {
        document.getElementById('selInput_'+pgId).value = s.customPivot;
      }
      if(s.confRange && s.confRange.min!=null) {
        const mn=document.getElementById('confRangeMin_'+pgId);
        if(mn) mn.value=s.confRange.min;
      }
      if(s.confRange && s.confRange.max!=null) {
        const mx=document.getElementById('confRangeMax_'+pgId);
        if(mx) mx.value=s.confRange.max;
      }
    });
    activePgId = savedActive;
    if(!pages[activePgId]) activePgId = parseInt(Object.keys(pages)[0]);
    return true;
  } catch(e) { return false; }
}

function createPageDOM(pgId) {
  // Create state
  pages[pgId] = {
    sel: null, currentGrid: null, customPivot: null, pinnedPrices: [], confPins: [],
    activeSteps: new Set(STEP_IDS), showAll: true,
    currentTab: 'levels',
    confPivots: [], sogliaActive: new Set(['g','y','o']),
    label: null,
    confRange: {min: null, max: null},
    includedPageIds: null,
    includedAngoliPageIds: null,
    // NatSq
    natsqMin: null, natsqMax: null, natsqFilters: new Set(['sq','half','qrt']),
    natsqPins: [],
    // Angoli
    angoliOrigin: null, angoliCurrent: null, angoliTime: 10, angoliDir: 'up',
    // Vibr
    vibrHigh: null, vibrLow: null, vibrCurrent: null, vibrPins: [],
    // Cicli — gestite come sotto-pagine indipendenti (cicliSubPages)
  };
  // Create DOM
  const div = document.createElement('div');
  div.className = 'pg';
  div.id = 'pg_' + pgId;
  div.innerHTML = buildPageHTML(pgId);
  document.getElementById('pagesWrap').appendChild(div);
}

function newPage(pivot, label) {
  pgCounter++;
  const pgId = pgCounter;
  createPageDOM(pgId);
  if(pivot) {
    pages[pgId].customPivot = pivot;
    pages[pgId].label = label || null;
    document.getElementById('selInput_'+pgId).value = pivot;
  }
  renderSafariBar();
  // Refresh page chips on all conf pages (a new page appeared)
  Object.keys(pages).forEach(id=>renderConfPagesChips(parseInt(id)));
  Object.keys(pages).forEach(id=>renderConfAngoliPagesChips(parseInt(id)));
  switchPageTo(pgId);
  if(pivot) { updateLevels(pgId); }
  saveAll();
  return pgId;
}

function closePage(pgId) {
  if(Object.keys(pages).length <= 1) return; // keep at least 1
  delete pages[pgId];
  document.getElementById('pg_'+pgId)?.remove();
  renderSafariBar();
  // Remove deleted page from other pages' includedPageIds, refresh chips
  Object.keys(pages).forEach(id=>{
    const s=pages[parseInt(id)];
    if(s.includedPageIds) s.includedPageIds=s.includedPageIds.filter(x=>x!==pgId);
    renderConfPagesChips(parseInt(id));
  });
  if(activePgId === pgId) {
    const remaining = Object.keys(pages);
    switchPageTo(parseInt(remaining[remaining.length-1]));
  }
  saveAll();
}

function switchPageTo(pgId) {
  activePgId = pgId;
  document.querySelectorAll('.pg').forEach(p => p.classList.toggle('active', p.id==='pg_'+pgId));
  renderSafariBar();
  updateSafariBarVisibility(pgId);
  // Scroll active tab into view
  setTimeout(() => {
    // scroll active tab into view inside the active page's safari bar
    const bar = document.getElementById('safariTabs_'+pgId);
    if(bar) {
      const tab = bar.querySelector('#stab_'+pgId);
      if(tab) tab.scrollIntoView({inline:'center', behavior:'smooth'});
    }
  }, 50);
}

// ═══════════════════════════════════════════════════════════
// MATH
// ═══════════════════════════════════════════════════════════
function angularLevels(pivot,stepsFilter){
  if(!pivot||pivot<=0)return[];
  const sqP=Math.sqrt(pivot);
  const STEPS=[
    {deg:90,   id:'90',  short:'90°',   cls:'c90',  tag:'tag-90'},
    {deg:45,   id:'45',  short:'45°',   cls:'c45',  tag:'tag-45'},
    {deg:22.5, id:'225', short:'22.5°', cls:'c225', tag:'tag-225'},
    {deg:11.25,id:'1125',short:'11.25°',cls:'c1125',tag:'tag-1125'},
    {deg:5.625,id:'5625',short:'5.625°',cls:'c5625',tag:'tag-5625'},
  ];
  const useSteps=stepsFilter?STEPS.filter(s=>stepsFilter.includes(s.id)):STEPS;
  const REVOLUTIONS=16;
  const results=[];
  useSteps.forEach(step=>{
    const nMax=Math.round((REVOLUTIONS*360)/step.deg);
    for(let i=-nMax;i<=nMax;i++){
      const delta=i*step.deg;
      const sqNew=sqP+delta/180;
      if(sqNew<=0)continue;
      const price=sqNew*sqNew;
      let mainStep=step;
      for(const s of STEPS){if(s.deg>step.deg){const ratio=step.deg*i/s.deg;if(Math.abs(ratio-Math.round(ratio))<1e-9){mainStep=s;break;}}}
      const revolutions=delta/360;
      const sign=delta>0?'+':'';
      const degLabel=`${sign}${delta%1===0?delta:delta.toFixed(3)}°`;
      const revLabel=Math.abs(revolutions)>=0.01?`${sign}${revolutions.toFixed(3)} giri`:'0';
      results.push({price,delta,stepId:step.id,mainStepId:mainStep.id,degLabel,revLabel,cls:mainStep.cls,tag:mainStep.tag,short:mainStep.short,isPivot:i===0});
    }
  });
  const byPrice=new Map();
  results.forEach(lv=>{
    const key=lv.price.toFixed(4);
    if(!byPrice.has(key)){byPrice.set(key,lv);}
    else{const ex=byPrice.get(key);const ei=STEPS.findIndex(s=>s.id===ex.mainStepId);const ni=STEPS.findIndex(s=>s.id===lv.mainStepId);if(ni<ei)byPrice.set(key,lv);}
  });
  const deduped=Array.from(byPrice.values());
  const pk=pivot.toFixed(4);
  deduped.forEach(lv=>{if(lv.price.toFixed(4)===pk)lv.isPivot=true;});
  deduped.sort((a,b)=>b.price-a.price);
  return deduped;
}
function isPerfectSquare(n){if(n<=0)return false;const s=Math.sqrt(n),r=Math.round(s);return Math.abs(s-r)<0.0015;}
function getRevType(rev){
  const frac=Math.abs(rev)%1;
  if(frac<0.012||frac>0.988)return'whole';
  if(Math.abs(frac-0.5)<0.012)return'half';
  if(Math.abs(frac-0.25)<0.012||Math.abs(frac-0.75)<0.012)return'quarter';
  return null;
}
function fmtPrice(p){return Number(p).toFixed(3);}

function toggleConfPin(price, pgId){
  const s=pgState(pgId);
  if(!s.confPins) s.confPins=[];
  const idx=s.confPins.findIndex(p=>Math.abs(p-price)<0.0001);
  if(idx>=0) s.confPins.splice(idx,1);
  else s.confPins.push(price);
  updateConf(pgId); saveAll();
}
function isConfPinned(price,s){
  return (s.confPins||[]).some(p=>Math.abs(p-price)<0.0001);
}

function togglePin(price, pgId){

  updateLevels(pgId); saveAll();
}
function isPinned(price, s){
  return (s.pinnedPrices||[]).some(p=>Math.abs(p-price)<0.0001);
}

function updateLevels(pgId){
  const s=pgState(pgId);
  const container=document.getElementById('levelsContainer_'+pgId);
  const disp=document.getElementById('pivotDisplay_'+pgId);
  const hint=document.getElementById('natSqHint_'+pgId);
  if(!container||!disp) return;
  const pivot=getPivot(pgId);
  if(pivot===null){
    disp.textContent='—';disp.className='pivot-value empty';
    if(hint)hint.textContent='';
    container.innerHTML='<div class="empty-msg"><strong>◎</strong>Inserisci un pivot sopra<br>o clicca una cella nella griglia</div>';
    renderLvPinNav(pgId);
    return;
  }
  disp.textContent=fmtPrice(pivot);disp.className='pivot-value';
  // update safari tab label
  s.label = fmtPrice(pivot);
  renderSafariBar();

  const sqN=Math.round(Math.sqrt(pivot)),nat=sqN*sqN;
  if(hint){
    if(Math.abs(nat-pivot)<0.01)hint.textContent=`✓ Quadrato perfetto: ${sqN}² = ${nat}`;
    else hint.textContent=`□² nat più vicino: ${sqN}² = ${nat}  (${nat>pivot?'+':''}${(nat-pivot).toFixed(2)}$)`;
  }

  const levX=angularLevels(pivot);
  const filtered=levX.filter(lv=>{if(lv.isPivot)return true;if(s.showAll)return true;return s.activeSteps.has(lv.mainStepId);});
  if(!filtered.length){container.innerHTML='<div class="empty-msg">Nessun livello</div>';renderLvPinNav(pgId);return;}
  let html='';
  const pins=s.pinnedPrices||[];
  filtered.forEach(lv=>{
    const isP=lv.isPivot;
    const rev=lv.delta/360;
    const revType=isP?null:getRevType(rev);
    const perfSq=!isP&&isPerfectSquare(lv.price);
    const pinned=isPinned(lv.price,s);
    let rowCls=isP?'lv-row is-pivot':'lv-row';
    if(revType==='whole')rowCls+=' rev-whole';
    if(revType==='half')rowCls+=' rev-half';
    if(revType==='quarter')rowCls+=' rev-quarter';
    if(perfSq)rowCls+=' perf-sq';
    if(pinned)rowCls+=' pinned-row';
    const priceCls=isP?'lv-price cpiv':'lv-price '+lv.cls;
    let tagTop=isP?`<span class="tag tag-piv">PIVOT</span>`:`<span class="tag ${lv.tag}">${lv.short}</span>`;
    let tagBot='';
    if(revType==='whole')tagBot+=`<span class="tag tag-whole">GIRO</span>`;
    if(revType==='half')tagBot+=`<span class="tag tag-half">½ GIRO</span>`;
    if(revType==='quarter')tagBot+=`<span class="tag tag-qrt">¼ GIRO</span>`;
    if(perfSq)tagBot+=`<span class="tag tag-sq">□²</span>`;
    if(pinned)tagBot+=`<span class="tag tag-pin">📌 PIN</span>`;
    const pk=lv.price.toFixed(6);
    html+=`<div class="${rowCls}" id="lvrow_${pgId}_${pk}" onclick="togglePin(${pk},${pgId})">
      <div class="${priceCls}">${fmtPrice(lv.price)}${isP?' ★':''}</div>
      <div class="lv-meta">
        <div class="lv-degs">${isP?'0°':lv.degLabel}</div>
        <div class="lv-revs">${isP?'— pivot —':lv.revLabel}</div>
      </div>
      <div class="lv-tags">${tagTop}${tagBot?`<div style="margin-top:3px;display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end">${tagBot}</div>`:''}</div>
    </div>`;
  });
  container.innerHTML=html;
  renderLvPinNav(pgId);
  requestAnimationFrame(()=>{
    if(pins.length>0){
      const el=container.querySelector('.pinned-row');
      if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
    } else {
      const el=container.querySelector('.is-pivot');
      if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
    }
  });
}

function renderLvPinNav(pgId){
  const slot=document.getElementById('lvPinNavSlot_'+pgId);

  const s=pgState(pgId);
  const pins=s?[...(s.pinnedPrices||[])].sort((a,b)=>b-a):[];
  if(!pins.length){slot.innerHTML='';return;}
  slot.innerHTML=`<div class="pin-nav-bar"><span class="pin-nav-label">📌 ${pins.length} pin</span><button class="pin-nav-btn" title="Pin precedente (più alto)" onclick="scrollToPinLv(${pgId},-1)">▲</button><button class="pin-nav-btn" title="Pin successivo (più basso)" onclick="scrollToPinLv(${pgId},+1)">▼</button><button class="pin-nav-clear" onclick="clearAllPinsLv(${pgId})" title="Rimuovi tutti i pin">✕</button></div>`;
}

let _lvPinIdx={};
function scrollToPinLv(pgId, dir){
  const s=pgState(pgId);
  if(!s) return;
  const pins=[...(s.pinnedPrices||[])].sort((a,b)=>b-a);
  if(!pins.length) return;
  if(_lvPinIdx[pgId]==null) _lvPinIdx[pgId]=0;
  _lvPinIdx[pgId]=((_lvPinIdx[pgId]+dir)+pins.length)%pins.length;
  const price=pins[_lvPinIdx[pgId]];
  const container=document.getElementById('levelsContainer_'+pgId);
  if(!container) return;
  // find closest row
  const rows=container.querySelectorAll('.pinned-row');
  let best=null,bestD=Infinity;
  rows.forEach(row=>{
    // extract price from id lvrow_pgId_price
    const parts=row.id.split('_');
    const p=parseFloat(parts[parts.length-1]);
    const d=Math.abs(p-price);
    if(d<bestD){bestD=d;best=row;}
  });
  if(best) best.scrollIntoView({behavior:'smooth',block:'center'});
}
function clearAllPinsLv(pgId){
  const s=pgState(pgId);
  if(!s) return;
  s.pinnedPrices=[];
  _lvPinIdx[pgId]=null;
  updateLevels(pgId);saveAll();
}

function selectByValue(rawVal, pgId){
  if(pgId===undefined) pgId=activePgId;
  const s=pgState(pgId);
  const normalized=String(rawVal).replace(',','.');
  const val=parseFloat(normalized);
  if(isNaN(val)||val<=0){s.sel=null;s.customPivot=null;updateLevels(pgId);saveAll();return;}
  if(Number.isInteger(val)&&s.currentGrid){
    const found=findByValue(s.currentGrid,val);
    if(found){s.sel=found;s.customPivot=null;updateLevels(pgId);saveAll();return;}
  }
  s.sel=null;s.customPivot=val;updateLevels(pgId);saveAll();
}

function renderConfPivots(pgId){
  const s=pgState(pgId);
  const macroList=document.getElementById('macroPivotList_'+pgId);
  const microList=document.getElementById('microPivotList_'+pgId);
  const macros=s.confPivots.filter(p=>p.source==='manual'&&p.type==='macro');
  const micros=s.confPivots.filter(p=>p.source==='manual'&&p.type==='micro');
  if(macroList){

    else macroList.innerHTML=macros.map(p=>`

function getMicroPivots(pgId){
  const result=[];
  const s=pgState(pgId);
  // 1. Micro manuali di questa pagina
  s.confPivots.filter(p=>p.source==='manual'&&p.type==='micro'&&p.value!=null).forEach(p=>{
    if(!result.some(r=>Math.abs(r.value-p.value)<0.001))
      result.push({label:p.label||fmtPrice(p.value),value:p.value,source:'micro',anchorMode:p.anchorMode||'X'});
  });
  // 2. Pivot delle pagine Livelli selezionate (includedPageIds: null = tutte)
  const manualValues=s.confPivots.filter(p=>p.source==='manual'&&p.value!=null).map(p=>p.value);
  const included=s.includedPageIds; // null = tutte; [] = nessuna; [id,...] = selettivo
  if(included===null||included.length>0){
    Object.keys(pages).forEach(id=>{
      const pid=parseInt(id);
      if(included!==null&&!included.includes(pid)) return;
      const piv=getPivot(pid);
      if(piv==null) return;
      const lbl=pages[pid].label||(piv?fmtPrice(piv):'');
      const isAlreadyManual=manualValues.some(mv=>Math.abs(mv-piv)<0.01);
      if(!isAlreadyManual&&!result.some(r=>Math.abs(r.value-piv)<0.001)){
        result.push({label:lbl,value:piv,source:'micro',anchorMode:'X'});
      }
    });
  }
  return result;
}

// ── Helper: genera tutti i prezzi vibranti per una pagina ──
function getVibrLevels(pgId){
  const s=pgState(pgId);
  if(!s||!s.vibrHigh||!s.vibrLow||s.vibrHigh<=s.vibrLow) return [];
  const sqHigh=Math.sqrt(s.vibrHigh);
  const sqLow=Math.sqrt(s.vibrLow);
  const vibUnit=sqHigh-sqLow;
  const fracs=[
    {f:0,is8th:false},{f:1/8,is8th:true},{f:2/8,is8th:false},{f:3/8,is8th:true},
    {f:4/8,is8th:false},{f:5/8,is8th:true},{f:6/8,is8th:false},{f:7/8,is8th:true},
  ];
  const levels=[];
  for(let n=0;n<=20;n++){
    for(const {f,is8th} of fracs){
      const sqTarget=sqLow+(n+f)*vibUnit;
      if(sqTarget<=0) continue;
      const price=sqTarget*sqTarget;
      if(price<s.vibrLow*0.3||price>s.vibrHigh*6) continue;
      levels.push({price,isFrac:f!==0,is8th});
    }
  }
  for(let n=1;n<=5;n++){
    for(const {f,is8th} of fracs){
      const sqTarget=sqHigh+(n+f)*vibUnit;
      if(sqTarget<=0) continue;
      const price=sqTarget*sqTarget;
      levels.push({price,isFrac:f!==0,is8th});
    }
  }
  return levels;
}

function updateConf(pgId){
  const s=pgState(pgId);
  const allPivots=[];
  s.confPivots.filter(p=>p.source==='manual'&&p.type==='macro'&&p.value!=null).forEach(p=>{
    allPivots.push({label:p.value!=null?fmtPrice(p.value):'',value:p.value,type:'macro',source:'manual'});
  });
  getMicroPivots(pgId).forEach(p=>allPivots.push({...p,type:'micro'}));
  const list=document.getElementById('confList_'+pgId);
  if(!list)return;
  if(allPivots.length<2){
    list.innerHTML='<div class="conf-empty"><strong>⬡</strong>Aggiungi almeno 2 pivot<br>per vedere le confluenze</div>';
    return;
  }
  const confStepFilter=['90','45'];
  const maxSoglia=s.sogliaActive.has('o')?10:s.sogliaActive.has('y')?5:3;

  // Compute levels X only for every pivot
  const pivotLevels=allPivots.map(p=>({
    ...p,
    lvX:angularLevels(p.value,confStepFilter),
  }));

  const allHits=[];
  pivotLevels.forEach((pl,pi)=>{
    pl.lvX.forEach(lv=>{
      allHits.push({pivotIdx:pi,lv,price:lv.price});
    });
  });

  // ── Cluster merge ──────────────────────────────────────────
  // 1. Sort all hits by price
  allHits.sort((a,b)=>a.price-b.price);

  // 2. Greedy cluster: each hit either joins an existing cluster (if within maxSoglia
  //    of the cluster's *weighted mean*) or starts a new one.
  //    We store clusters as arrays of hits; center = mean of hit prices.
  const clusters=[];
  for(const hit of allHits){
    // find best cluster: nearest center within maxSoglia, prefer same-pivot clusters last
    let bestIdx=-1,bestDist=Infinity;
    for(let ci=0;ci<clusters.length;ci++){
      const c=clusters[ci];
      const dist=Math.abs(c.center-hit.price);
      if(dist<=maxSoglia&&dist<bestDist){bestDist=dist;bestIdx=ci;}
    }
    if(bestIdx>=0){
      const c=clusters[bestIdx];
      // avoid duplicate pivot
      if(!c.hits.some(h=>h.pivotIdx===hit.pivotIdx)){
        c.hits.push({...hit,dist:bestDist});
        // recalculate center as mean of all distinct hit prices
        c.center=c.hits.reduce((s,h)=>s+h.price,0)/c.hits.length;
      }
    } else {
      clusters.push({center:hit.price,hits:[{...hit,dist:0}]});
    }
  }

  // 3. Filter: need ≥2 distinct pivots
  const confluences=clusters.filter(c=>{
    const dp=new Set(c.hits.map(h=>h.pivotIdx));
    return dp.size>=2;
  });

  // ── Grade = based on max pairwise spread among hit prices ──
  function gradeOf(c){
    const prices=c.hits.map(h=>h.price);
    const spread=Math.max(...prices)-Math.min(...prices);
    if(spread<=3&&s.sogliaActive.has('g'))return'g';
    if(spread<=5&&s.sogliaActive.has('y'))return'y';
    if(spread<=10&&s.sogliaActive.has('o'))return'o';
    return null;
  }

  // ── Strength score for sorting ─────────────────────────────
  // More distinct pivots > more methods > giro/half > grade
  function scoreOf(c,grade){
    const dp=new Set(c.hits.map(h=>h.pivotIdx));
    const pivotCount=dp.size;
    const wholeGiro=c.hits.filter(h=>getRevType(h.lv.delta/360)==='whole').length;
    const halfGiro=c.hits.filter(h=>getRevType(h.lv.delta/360)==='half').length;
    const gradeScore={'g':3,'y':2,'o':1}[grade]||0;
    return pivotCount*100 + wholeGiro*10 + halfGiro*5 + gradeScore;
  }

  const rMin=s.confRange?.min, rMax=s.confRange?.max;
  const visible=confluences
    .map(c=>({...c,grade:gradeOf(c)}))
    .filter(c=>{
      if(!c.grade)return false;
      if(rMin!=null&&c.center<rMin)return false;
      if(rMax!=null&&c.center>rMax)return false;
      return true;
    });

  visible.sort((a,b)=>b.center-a.center);

  if(!visible.length){list.innerHTML='<div class="conf-empty"><strong>⬡</strong>Nessuna confluenza<br>con la soglia selezionata</div>';return;}

  // Prepara livelli vibranti per confronto
  const vibrLevels=getVibrLevels(pgId);

  list.innerHTML=visible.map(c=>{
    const grade=c.grade;
    const distinctPivots=[...new Set(c.hits.map(h=>h.pivotIdx))];
    const pinned=isConfPinned(c.center,s);

    // ── Badge vibrazione ──────────────────────────────────────
    let vibrBadge='';
    const vibrHit=vibrLevels.find(lv=>Math.abs(lv.price-c.center)<=maxSoglia);
    if(vibrHit){
      if(vibrHit.is8th){
        vibrBadge=`<span class="conf-vibr-badge conf-vibr-8th">≋⅛</span>`;
      } else if(vibrHit.isFrac){
        vibrBadge=`<span class="conf-vibr-badge conf-vibr-frac">≋¼</span>`;
      } else {
        vibrBadge=`<span class="conf-vibr-badge conf-vibr-full">≋V</span>`;
      }
    }

    // Stars: one per distinct pivot, colore = tipo (macro=oro, micro=blu)
    const starsHtml=distinctPivots.map(pi=>{
      const pvt=allPivots[pi];
      return`<span class="star ${pvt.type==='macro'?'macro':'micro'}">★</span>`;
    }).join('');

    let aboveCount=0,belowCount=0;
    distinctPivots.forEach(pi=>{const pv=allPivots[pi].value;if(c.center>pv)aboveCount++;else if(c.center<pv)belowCount++;});
    let dirLabel='—',dirCls='';
    if(aboveCount>0&&belowCount===0){dirLabel='RES ↑';dirCls='res';}
    else if(belowCount>0&&aboveCount===0){dirLabel='SUP ↓';dirCls='sup';}
    else if(aboveCount>0&&belowCount>0){dirLabel='MIX';dirCls='mix';}

    // pivot count badge if 3+
    const pvCountBadge=distinctPivots.length>=3
      ?`<span style="font-size:9px;font-weight:900;color:#aaa;margin-left:4px;">${distinctPivots.length}piv</span>`:'';

    // One line per distinct pivot
    const plinesHtml=distinctPivots.map(pi=>{
      const pvt=allPivots[pi];
      const pivHits=c.hits.filter(h=>h.pivotIdx===pi);
      const bestHit=pivHits[0];
      const lv=bestHit.lv;
      const rev=lv.delta/360;
      const revType=getRevType(rev);
      const perfSq=isPerfectSquare(lv.price);

      const exactPrice=bestHit.price;
      const delta=exactPrice-c.center;
      const deltaStr=(delta>=0?'+':'')+delta.toFixed(3);
      const exactStr=fmtPrice(exactPrice);

      let tags='';
      if(lv.mainStepId==='90')      tags+=`<span class="conf-ptag cpt-90">90°</span>`;
      else if(lv.mainStepId==='45') tags+=`<span class="conf-ptag cpt-45">45°</span>`;
      if(revType==='whole')   tags+=`<span class="conf-ptag cpt-whole">GIRO</span>`;
      if(revType==='half')    tags+=`<span class="conf-ptag cpt-half">½</span>`;
      if(revType==='quarter') tags+=`<span class="conf-ptag cpt-qrt">¼</span>`;
      if(perfSq)              tags+=`<span class="conf-ptag cpt-sq">□²</span>`;

      return`<div class="conf-pline">
        <div class="conf-pline-name ${pvt.type}">${pvt.label||fmtPrice(pvt.value)}</div>
        <div class="conf-pline-tags">${tags}</div>
        <div class="conf-pline-prices">
          <span class="cpp-exact">${exactStr}</span>
          <span class="cpp-delta ${delta>=0?'pos':'neg'}">${deltaStr}</span>
        </div>
      </div>`;
    }).join('');

    const ck=c.center.toFixed(6);
    return`<div class="conf-card grade-${grade}${pinned?' conf-card-pinned':''}" id="confcard_${pgId}_${ck}" onclick="toggleConfPin(${ck},${pgId})">
      <div class="conf-card-header">
        <div class="conf-price-big">${fmtPrice(c.center)}</div>
        <div class="conf-stars">${starsHtml}${pvCountBadge}</div>
        ${vibrBadge}
        ${pinned?`<span class="tag tag-pin" style="margin-left:4px;">📌</span>`:''}
        ${dirCls?`<div class="conf-dir ${dirCls}">${dirLabel}</div>`:''}
      </div>
      <div class="conf-pivot-lines">${plinesHtml}</div>
    </div>`;
  }).join('');

  renderConfPinNav(pgId);
}

// ═══════════════════════════════════════════════════════════
// GRID (per-page)
// ═══════════════════════════════════════════════════════════
function spiralSquare(sz,sv){
  const g=Array.from({length:sz},()=>Array(sz).fill(0));
  let x=Math.floor(sz/2),y=Math.floor(sz/2),cur=sv;
  g[y][x]=cur++;
  const dirs=[[1,0],[0,-1],[-1,0],[0,1]];
  let sl=1,di=0,max=sv+sz*sz;
  while(cur<max){
    for(let rep=0;rep<2;rep++){const[dx,dy]=dirs[di%4];for(let i=0;i<sl;i++){if(cur>=max)break;x+=dx;y+=dy;if(x>=0&&x<sz&&y>=0&&y<sz)g[y][x]=cur++;}di++;}
    sl++;
  }
  return g;
}
function findByValue(grid,val){for(let r=0;r<grid.length;r++)for(let c=0;c<grid.length;c++)if(grid[r][c]===val)return{r,c};return null;}
function polar(cx,cy,r,deg){const rad=(deg-90)*Math.PI/180;return[cx+r*Math.cos(rad),cy+r*Math.sin(rad)];}
function squarePoints(cx,cy,side,rotDeg){
  const h=side/2,pts=[[-h,-h],[h,-h],[h,h],[-h,h]];
  const rad=rotDeg*Math.PI/180,c=Math.cos(rad),s=Math.sin(rad);
  return pts.map(([x,y])=>[cx+x*c-y*s,cy+x*s+y*c]);
}
function clamp(v){let n=parseInt(v,10);if(isNaN(n)||n<3)n=3;if(n>99)n=99;return n%2===0?n+1:n;}
function p4(n){return n.toFixed(4);}

function renderGrid(pgId){

  const sz=clamp(document.getElementById('gridSize_'+pgId)?.value||17);
  let rot=parseFloat(document.getElementById('rotation_'+pgId)?.value||45);
  if(isNaN(rot))rot=45;rot=Math.max(0,Math.min(360,rot));
  document.getElementById('gridSize_'+pgId).value=sz;
  document.getElementById('rotLabel_'+pgId).textContent=rot.toFixed(1)+'°';
  const wrap=document.getElementById('chartWrap_'+pgId);

}

function buildGrid(sv,sz,rot,pgId){
  const s=pgState(pgId);
  const cx=700,cy=700,sqSide=720;
  const left=cx-sqSide/2,top=cy-sqSide/2,cell=sqSide/sz;
  const ringR=sqSide/Math.sqrt(2)+65,tickR=ringR+22;
  const grid=spiralSquare(sz,sv);
  s.currentGrid=grid;
  let fs=cell*0.26;
  if(sz<=11)fs=cell*0.31;if(sz>=25)fs=cell*0.22;if(sz>=33)fs=cell*0.19;
  if(sz>=51)fs=cell*0.17;if(sz>=71)fs=cell*0.15;if(sz>=91)fs=cell*0.13;
  let svg=`<rect x="-60" y="-60" width="1520" height="1520" fill="#0f0f13"/>`;
  svg+=`<circle cx="${cx}" cy="${cy}" r="${p4(ringR)}" fill="none" stroke="#1e1e28" stroke-width="2"/>`;
  for(let deg=0;deg<360;deg+=5){
    const major=deg%45===0,mid=deg%15===0;
    const a=polar(cx,cy,ringR-(major?14:mid?8:5),deg),b=polar(cx,cy,tickR+(major?8:mid?4:0),deg);
    svg+=`<line x1="${p4(a[0])}" y1="${p4(a[1])}" x2="${p4(b[0])}" y2="${p4(b[1])}" stroke="${major?'#444':'#202028'}" stroke-width="${major?1.8:0.8}"/>`;
    if(mid){const t=polar(cx,cy,tickR+24,deg);svg+=`<text x="${p4(t[0])}" y="${p4(t[1])}" text-anchor="middle" dominant-baseline="middle" fill="#3a3a4a" font-size="11" font-weight="600" font-family="sans-serif">${deg}°</text>`;}
  }
  const MONTHS=['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
  const DPM=[31,28,31,30,31,30,31,31,30,31,30,31];
  const dpd=360/365,mRing=tickR+60,dTickIn=tickR+38,dTickOut=tickR+44,mSep=tickR+50;
  svg+=`<circle cx="${cx}" cy="${cy}" r="${p4(tickR+68)}" fill="none" stroke="#1e1408" stroke-width="1" stroke-dasharray="3,5"/>`;
  let doy=0;
  for(let m=0;m<12;m++){
    const dpm=DPM[m],mS=doy*dpd,mE=(doy+dpm)*dpd,mM=(mS+mE)/2;
    const mt=polar(cx,cy,mRing,mM);
    svg+=`<text x="${p4(mt[0])}" y="${p4(mt[1])}" text-anchor="middle" dominant-baseline="middle" fill="#3a2810" font-size="10" font-weight="700" font-family="sans-serif" transform="rotate(${mM.toFixed(2)},${p4(mt[0])},${p4(mt[1])})">${MONTHS[m]}</text>`;
    const sa=polar(cx,cy,dTickIn,mS),sb=polar(cx,cy,mSep+6,mS);
    svg+=`<line x1="${p4(sa[0])}" y1="${p4(sa[1])}" x2="${p4(sb[0])}" y2="${p4(sb[1])}" stroke="#3a2810" stroke-width="1.2"/>`;
    for(let d=0;d<dpm;d++){
      const dd=(doy+d)*dpd,dn=d+1,show=[1,10,20].includes(dn);
      const ta=polar(cx,cy,dTickIn,dd),tb=polar(cx,cy,dTickOut+(show?2:0),dd);
      svg+=`<line x1="${p4(ta[0])}" y1="${p4(ta[1])}" x2="${p4(tb[0])}" y2="${p4(tb[1])}" stroke="${show?'#2a2a38':'#161620'}" stroke-width="${show?1:0.5}"/>`;
    }
    doy+=dpm;
  }
  svg+=`<rect x="${p4(left)}" y="${p4(top)}" width="${sqSide}" height="${sqSide}" fill="#0d0d11" stroke="#252530" stroke-width="3"/>`;
  for(let i=0;i<=sz;i++){
    const xi=left+i*cell,yi=top+i*cell;
    svg+=`<line x1="${p4(xi)}" y1="${p4(top)}" x2="${p4(xi)}" y2="${p4(top+sqSide)}" stroke="#141420" stroke-width="0.8"/>`;
    svg+=`<line x1="${p4(left)}" y1="${p4(yi)}" x2="${p4(left+sqSide)}" y2="${p4(yi)}" stroke="#141420" stroke-width="0.8"/>`;
  }
  svg+=`<line x1="${p4(left)}" y1="${p4(top)}" x2="${p4(left+sqSide)}" y2="${p4(top+sqSide)}" stroke="#202030" stroke-width="1.5"/>`;
  svg+=`<line x1="${p4(left+sqSide)}" y1="${p4(top)}" x2="${p4(left)}" y2="${p4(top+sqSide)}" stroke="#202030" stroke-width="1.5"/>`;
  svg+=`<line x1="${p4(cx)}" y1="${p4(top)}" x2="${p4(cx)}" y2="${p4(top+sqSide)}" stroke="#4a1818" stroke-width="1.5"/>`;
  svg+=`<line x1="${p4(left)}" y1="${p4(cy)}" x2="${p4(left+sqSide)}" y2="${p4(cy)}" stroke="#4a1818" stroke-width="1.5"/>`;
  const sc=s.sel;
  for(let r=0;r<sz;r++){
    for(let c=0;c<sz;c++){
      const x=left+c*cell+cell/2,y=top+r*cell+cell/2;
      svg+=`<rect x="${p4(left+c*cell)}" y="${p4(top+r*cell)}" width="${p4(cell)}" height="${p4(cell)}" fill="transparent" stroke="none" style="cursor:pointer" onclick="pickGrid(${r},${c},${pgId})"/>`;
      svg+=`<text x="${p4(x)}" y="${p4(y)}" text-anchor="middle" dominant-baseline="middle" fill="#666" font-size="${fs.toFixed(2)}" font-weight="500" font-family="sans-serif" style="pointer-events:none">${grid[r][c]}</text>`;
    }
  }
  if(sc){
    // 8 congruenti: simmetrie del quadrato (riflessioni di (dr,dc) su tutti gli assi)
    const centerR=Math.floor(sz/2),centerC=Math.floor(sz/2);
    const dr=sc.r-centerR,dc=sc.c-centerC;
    const offsets=[[dr,dc],[-dr,dc],[dr,-dc],[-dr,-dc],[dc,dr],[-dc,dr],[dc,-dr],[-dc,-dr]];
    const seen=new Set();
    offsets.forEach(([or,oc])=>{
      const r=centerR+or,c=centerC+oc;
      if(r>=0&&r<sz&&c>=0&&c<sz){
        const k=`${r},${c}`;
        if(!seen.has(k)){seen.add(k);
          const isSel=(r===sc.r&&c===sc.c);
          const fc=isSel?'#e05555':'#d4a030';
          const fo=isSel?0.28:0.18;
          svg+=`<rect x="${p4(left+c*cell+1)}" y="${p4(top+r*cell+1)}" width="${p4(cell-2)}" height="${p4(cell-2)}" fill="${fc}" fill-opacity="${fo}" stroke="${fc}" stroke-width="1.5" style="pointer-events:none"/>`;
          svg+=`<text x="${p4(left+c*cell+cell/2)}" y="${p4(top+r*cell+cell/2)}" text-anchor="middle" dominant-baseline="middle" fill="${fc}" font-size="${fs.toFixed(2)}" font-weight="${isSel?'800':'600'}" font-family="sans-serif" style="pointer-events:none">${grid[r][c]}</text>`;
        }
      }
    });
  }
  let effRot=rot;
  if(sc){
    const ccx=left+sc.c*cell+cell/2,ccy=top+sc.r*cell+cell/2;
    let ang=Math.atan2(ccy-cy,ccx-cx)*180/Math.PI+90;
    if(ang<0)ang+=360;if(ang>=360)ang-=360;
    effRot=ang-315;if(effRot<0)effRot+=360;if(effRot>=360)effRot-=360;
    document.getElementById('rotation_'+pgId).value=effRot.toFixed(1);
    document.getElementById('rotationBox_'+pgId).value=effRot.toFixed(1);
    document.getElementById('rotLabel_'+pgId).textContent=effRot.toFixed(1)+'°';
  }
  const corners=squarePoints(cx,cy,sqSide,effRot);
  const pts=corners.map(p=>`${p4(p[0])},${p4(p[1])}`).join(' ');
  svg+=`<polygon points="${pts}" fill="none" stroke="#e05555" stroke-width="2.5" stroke-linejoin="round" opacity="0.8"/>`;
  const mid=(a,b)=>[(a[0]+b[0])/2,(a[1]+b[1])/2];
  [[mid(corners[0],corners[1]),mid(corners[2],corners[3])],[mid(corners[1],corners[2]),mid(corners[3],corners[0])],[corners[0],corners[2]],[corners[1],corners[3]]].forEach(([a,b])=>{
    svg+=`<line x1="${p4(a[0])}" y1="${p4(a[1])}" x2="${p4(b[0])}" y2="${p4(b[1])}" stroke="#e05555" stroke-width="1.2" opacity="0.5"/>`;
  });
  corners.forEach(p=>{svg+=`<circle cx="${p4(p[0])}" cy="${p4(p[1])}" r="5" fill="#0f0f13" stroke="#e05555" stroke-width="2"/>`;});
  return svg;
}

function pickGrid(r,c,pgId){
  const s=pgState(pgId);
  s.sel=(s.sel&&s.sel.r===r&&s.sel.c===c)?null:{r,c};
  s.customPivot=null;
  if(s.sel&&s.currentGrid){
    const v=s.currentGrid[r][c];
    document.getElementById('selInput_'+pgId).value=v;
    selectByValue(v,pgId);
  } else {
    document.getElementById('selInput_'+pgId).value='';
    updateLevels(pgId);
  }
  // Resta sulla griglia — ridisegna con selezione e congruenti evidenziate
  renderGrid(pgId);
}
function syncSlider(pgId){
  const v=document.getElementById('rotation_'+pgId)?.value;
  document.getElementById('rotationBox_'+pgId).value=v;
  document.getElementById('rotLabel_'+pgId).textContent=parseFloat(v).toFixed(1)+'°';
  renderGrid(pgId);
}
function syncBox(pgId){
  const v=document.getElementById('rotationBox_'+pgId)?.value;
  document.getElementById('rotation_'+pgId).value=v;
  document.getElementById('rotLabel_'+pgId).textContent=parseFloat(v).toFixed(1)+'°';
  renderGrid(pgId);
}


// ═══════════════════════════════════════════════════════════
// NATURAL SQUARES (tab Nat □²)
// ═══════════════════════════════════════════════════════════
function toggleNsFilter(key, pgId){
  const s=pgState(pgId);
  if(s.natsqFilters.has(key)) s.natsqFilters.delete(key);
  else s.natsqFilters.add(key);
  if(!s.natsqFilters.size) s.natsqFilters.add('sq');
  updateNatSqFiltersUI(pgId);
  updateNatSq(pgId);
  saveAll();
}
function updateNatSqFiltersUI(pgId){
  const s=pgState(pgId);
  ['sq','half','qrt','8th'].forEach(k=>{
    const el=document.getElementById('nsf-'+k+'_'+pgId);
    if(el) el.classList.toggle('on', s.natsqFilters.has(k));
  });
}
function toggleNatSqPin(price, pgId){
  const s=pgState(pgId);
  if(!s.natsqPins) s.natsqPins=[];
  const idx=s.natsqPins.findIndex(p=>Math.abs(p-price)<0.0001);
  if(idx>=0) s.natsqPins.splice(idx,1); else s.natsqPins.push(price);
  updateNatSq(pgId); saveAll();
}

function updateNatSq(pgId){
  const s=pgState(pgId);
  const mn=parseFloat(document.getElementById('natsqMin_'+pgId)?.value||'');
  const mx=parseFloat(document.getElementById('natsqMax_'+pgId)?.value||'');
  if(!isNaN(mn)) s.natsqMin=mn; else s.natsqMin=null;
  if(!isNaN(mx)) s.natsqMax=mx; else s.natsqMax=null;

  const container=document.getElementById('natsqContainer_'+pgId);
  if(!container) return;
  if(!s.natsqMin||!s.natsqMax||s.natsqMin>=s.natsqMax){
    container.innerHTML='<div class="empty-msg"><strong>□²</strong>Inserisci un range Min/Max valido<br>per vedere i quadrati naturali</div>';
    renderNatSqPinNav(pgId); saveAll(); return;
  }

  // Build all natural square levels in range
  const levels=[];
  const sqMin=Math.floor(Math.sqrt(s.natsqMin));
  const sqMax=Math.ceil(Math.sqrt(s.natsqMax))+1;
  for(let n=Math.max(1,sqMin-1); n<=sqMax; n++){
    const base=n*n;
    // fractions: 0, 1/8, 2/8=1/4, 3/8, 4/8=1/2, 5/8, 6/8=3/4, 7/8, 1
    const next=(n+1)*(n+1);
    const step=next-base;
    for(let f=0; f<=8; f++){
      const price=base+(step*f/8);
      if(price<s.natsqMin||price>s.natsqMax) continue;
      let type, fraction=f/8;
      if(f===0||f===8) type='sq'; // integer square
      else if(f===4) type='half';
      else if(f===2||f===6) type='qrt';
      else type='8th';
      if(!s.natsqFilters.has(type)) continue;
      const baseN=(f===8)?n+1:n;
      const fStr=f===0?`${n}²`:f===8?`${n+1}²`:f===4?`${n}² + ½`:f===2?`${n}² + ¼`:f===6?`${n}² + ¾`:f===1?`${n}² + ⅛`:f===3?`${n}² + ⅜`:f===5?`${n}² + ⅝`:`${n}² + ⅞`;
      levels.push({price,type,label:fStr,n:baseN,f});
    }
  }
  levels.sort((a,b)=>b.price-a.price);
  if(!levels.length){container.innerHTML='<div class="empty-msg">Nessun livello nel range con i filtri attivi</div>';renderNatSqPinNav(pgId);saveAll();return;}

  const pins=s.natsqPins||[];
  container.innerHTML=levels.map(lv=>{
    const pinned=pins.some(p=>Math.abs(p-lv.price)<0.0001);
    let cls='natsq-row';
    let tag='',tagCls='',sub='';
    if(lv.type==='sq'){cls+=' is-integer';tag='□² intero';tagCls='natsq-tag-int';sub='= '+Math.round(Math.sqrt(lv.price))+')';}
    else if(lv.type==='half'){cls+=' is-half';tag='½ quadrato';tagCls='natsq-tag-half';}
    else if(lv.type==='qrt'){cls+=' is-quarter';tag='¼ / ¾';tagCls='natsq-tag-qrt';}
    else{cls+=' is-8th';tag='⅛';tagCls='natsq-tag-8th';}
    if(pinned) cls+=' pinned-row';
    const pinTag=pinned?'<span class="tag tag-pin">📌</span>':'';
    const pk=lv.price.toFixed(6);
    return '<div class="'+cls+'" onclick="toggleNatSqPin('+pk+','+pgId+')">'
      +'<div class="natsq-price">'+fmtPrice(lv.price)+'</div>'
      +'<div class="natsq-meta">'
        +'<div class="natsq-label">'+lv.label+'</div>'
        +'<div class="natsq-sub">'+sub+'</div>'
      +'</div>'
      +'<div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;">'
        +'<span class="natsq-tag '+tagCls+'">'+tag+'</span>'
        +pinTag
      +'</div>'
    +'</div>';
  }).join('');
  renderNatSqPinNav(pgId);
  saveAll();
}

let _natsqPinIdx={};
function renderNatSqPinNav(pgId){
  const slot=document.getElementById('natsqPinNavSlot_'+pgId);
  if(!slot) return;
  const s=pgState(pgId);
  const pins=[...(s.natsqPins||[])].sort((a,b)=>b-a);
  if(!pins.length){slot.innerHTML='';return;}
  slot.innerHTML=`<div class="pin-nav-bar"><span class="pin-nav-label">📌 ${pins.length} pin</span><button class="pin-nav-btn" onclick="scrollToPinNatSq(${pgId},-1)">▲</button><button class="pin-nav-btn" onclick="scrollToPinNatSq(${pgId},+1)">▼</button><button class="pin-nav-clear" onclick="clearNatSqPins(${pgId})">✕</button></div>`;
}
function scrollToPinNatSq(pgId,dir){
  const s=pgState(pgId);
  const pins=[...(s.natsqPins||[])].sort((a,b)=>b-a);
  if(!pins.length)return;
  if(_natsqPinIdx[pgId]==null)_natsqPinIdx[pgId]=0;
  _natsqPinIdx[pgId]=((_natsqPinIdx[pgId]+dir)+pins.length)%pins.length;
  const price=pins[_natsqPinIdx[pgId]];
  const container=document.getElementById('natsqContainer_'+pgId);
  if(!container)return;
  let best=null,bestD=Infinity;
  container.querySelectorAll('.natsq-row').forEach(row=>{
    const p=parseFloat(row.querySelector('.natsq-price')?.textContent||'0');
    const d=Math.abs(p-price);
    if(d<bestD){bestD=d;best=row;}
  });
  if(best)best.scrollIntoView({behavior:'smooth',block:'center'});
}
function clearNatSqPins(pgId){const s=pgState(pgId);s.natsqPins=[];_natsqPinIdx[pgId]=null;updateNatSq(pgId);saveAll();}

// ═══════════════════════════════════════════════════════════
</script>
<script>
// ANGOLI DI GANN — con date reali e multi-pagina
// Metodo Gann: giorni di calendario (365 = 360°)
// Per ogni angolo, dato prezzo origine + data origine,
// calcola la data in cui l'angolo tocca ogni livello di prezzo.
// ═══════════════════════════════════════════════════════════
const GANN_ANGLES=[
  {ratio:8,   name:'8×1', cls:'a-8x1', force:'high', desc:'Molto ripido — resistenza forte'},
  {ratio:4,   name:'4×1', cls:'a-4x1', force:'high', desc:'Ripido — resistenza significativa'},
  {ratio:2,   name:'2×1', cls:'a-2x1', force:'high', desc:'Moderato — supporto/resistenza'},
  {ratio:1,   name:'1×1', cls:'a-1x1', force:'max',  desc:'45° — Linea di equilibrio assoluta'},
  {ratio:0.5, name:'1×2', cls:'a-1x2', force:'med',  desc:'Debole — zona di transizione'},
  {ratio:0.25,name:'1×4', cls:'a-1x4', force:'med',  desc:'Molto debole'},
  {ratio:0.125,name:'1×8',cls:'a-1x8', force:'low',  desc:'Minimo supporto'},
];

// ── flags per bloccare saveAll durante il restore ─────────
let _angoliSkipSave = false;
let _cicliSkipSave  = false;
// angoliSubPages[pgId] = [{id, label, origin, originDate, current, dir, futureOnly, scale}, ...]
// angoliActiveSubPage[pgId] = subPageId
let angoliSubPages = {};
let angoliActiveSubPage = {};
let angoliSubCounter = {};

function angoliPgState(pgId) {
  if(!angoliSubPages[pgId]) angoliSubPages[pgId]=[];
  return angoliSubPages[pgId];
}
function angoliActiveSub(pgId) {
  const subs=angoliPgState(pgId);
  const aid=angoliActiveSubPage[pgId];
  return subs.find(s=>s.id===aid)||subs[0]||null;
}

// Build HTML for one angoli sub-page
function buildAngoliSubHTML(pgId, subId) {
  return `<div class="pg" id="angoli-pg_${pgId}_${subId}" style="position:absolute;inset:0;display:flex;flex-direction:column;">
    <div id="angoliSettings_${pgId}_${subId}" style="flex-shrink:0;">
      <div class="angoli-header">
        <span class="angoli-title">Angoli di Gann</span>
        <span class="angoli-desc">Dal punto di origine, ogni angolo viene "squarato" nel tempo (giorni calendario, come Gann). La data mostrata è quando il prezzo tocca quell'angolo.</span>
      </div>
      <div class="angoli-inputs">
        <div class="angoli-input-row">
          <div class="angoli-field">
            <span class="ctrl-label">Prezzo Origine</span>
            <input class="ctrl-input angoli-inp" id="angoliOrigin_${pgId}_${subId}" type="number" placeholder="es. 3150" inputmode="decimal" oninput="updateAngoliSub(${pgId},${subId})" style="width:105px;">
          </div>
          <div class="angoli-field">
            <span class="ctrl-label">Data Origine</span>
            <input class="angoli-date-inp" id="angoliOriginDate_${pgId}_${subId}" type="date" oninput="updateAngoliSub(${pgId},${subId})">
          </div>
        </div>
        <div class="angoli-input-row" style="margin-bottom:0;">
          <div class="angoli-field">
            <span class="ctrl-label">Prezzo Attuale</span>
            <input class="ctrl-input angoli-inp" id="angoliCurrent_${pgId}_${subId}" type="number" placeholder="es. 3300" inputmode="decimal" oninput="updateAngoliSub(${pgId},${subId})" style="width:105px;">
            <button class="nat-sq-btn" style="margin-top:4px;font-size:9px;padding:4px 7px;" onclick="angoliSubUsePivot(${pgId},${subId})">← Pivot</button>
          </div>
          <div class="angoli-field">
            <span class="ctrl-label">Data Attuale</span>
            <input class="angoli-date-inp" id="angoliCurrentDate_${pgId}_${subId}" type="date" oninput="updateAngoliSub(${pgId},${subId})">
          </div>
        </div>
        <div class="angoli-dir-row">
          <span class="ctrl-label">Direzione</span>
          <button id="angoliDirUp_${pgId}_${subId}" class="fbtn angoli-dir-btn active-dir" onclick="setAngoliSubDir('up',${pgId},${subId})">↑ Bottom (RES)</button>
          <button id="angoliDirDn_${pgId}_${subId}" class="fbtn angoli-dir-btn" onclick="setAngoliSubDir('dn',${pgId},${subId})">↓ Top (SUP)</button>
        </div>
        <div class="angoli-opts-row">
          <button id="angoliFutureBtn_${pgId}_${subId}" class="angoli-future-btn" onclick="toggleAngoliFutureOnly(${pgId},${subId})">Solo futuri</button>
          <span style="font-size:9px;color:#333;margin-left:4px;">tocca per filtrare date passate</span>
        </div>
      </div>
    </div>
    <div id="angoliContainer_${pgId}_${subId}" style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;">
      <div class="empty-msg"><strong>∠</strong>Inserisci prezzo e data di origine</div>
    </div>
  </div>`;
}

function newAngoliPage(pgId, restoreData, _skipSave) {
  if(!angoliSubCounter[pgId]) angoliSubCounter[pgId]=0;
  let subId;
  if(restoreData && restoreData.id) {
    subId = restoreData.id;
    if(subId > angoliSubCounter[pgId]) angoliSubCounter[pgId] = subId;
  } else {
    angoliSubCounter[pgId]++;
    subId = angoliSubCounter[pgId];
  }
  const data=restoreData||{};
  const sub={
    id: subId,
    label: data.label||null,
    origin: data.origin||null,
    originDate: data.originDate||null,
    current: data.current||null,
    currentDate: data.currentDate||null,
    dir: data.dir||'up',
    futureOnly: data.futureOnly||false,
  };
  angoliPgState(pgId).push(sub);
  // Build DOM
  const wrap=document.getElementById('angoliPagesWrap_'+pgId);
  if(wrap){
    const div=document.createElement('div');
    div.innerHTML=buildAngoliSubHTML(pgId,subId);
    wrap.appendChild(div.firstChild);
  }
  angoliActiveSubPage[pgId]=subId;
  renderAngoliSafariBar(pgId);
  switchAngoliSubPage(pgId,subId);
  // Restore inputs
  if(sub.origin!=null){const el=document.getElementById('angoliOrigin_'+pgId+'_'+subId);if(el)el.value=sub.origin;}
  if(sub.originDate){const el=document.getElementById('angoliOriginDate_'+pgId+'_'+subId);if(el)el.value=sub.originDate;}
  if(sub.current!=null){const el=document.getElementById('angoliCurrent_'+pgId+'_'+subId);if(el)el.value=sub.current;}
  if(sub.currentDate){const el=document.getElementById('angoliCurrentDate_'+pgId+'_'+subId);if(el)el.value=sub.currentDate;}
  updateAngoliDirUI(pgId,subId);
  updateAngoliFutureUI(pgId,subId);
  if(!restoreData) { // Set today as default current date for new pages
    const todayStr=getTodayStr();
    const el=document.getElementById('angoliCurrentDate_'+pgId+'_'+subId);
    if(el&&!el.value){el.value=todayStr;sub.currentDate=todayStr;}
  }
  _angoliSkipSave=!!_skipSave;
  updateAngoliSub(pgId,subId);
  _angoliSkipSave=false;
  if(!_skipSave) saveAll();
  return subId;
}

function closeAngoliPage(pgId, subId) {
  const subs=angoliPgState(pgId);
  if(subs.length<=1) return;
  const idx=subs.findIndex(s=>s.id===subId);
  subs.splice(idx,1);
  document.getElementById('angoli-pg_'+pgId+'_'+subId)?.remove();
  const next=subs[Math.min(idx,subs.length-1)];
  if(next) switchAngoliSubPage(pgId,next.id);
  renderAngoliSafariBar(pgId);
  saveAll();
}

function switchAngoliSubPage(pgId, subId) {
  angoliActiveSubPage[pgId]=subId;
  const subs=angoliPgState(pgId);
  subs.forEach(s=>{
    const el=document.getElementById('angoli-pg_'+pgId+'_'+s.id);
    if(el){el.style.opacity=s.id===subId?'1':'0';el.style.pointerEvents=s.id===subId?'all':'none';}
  });
  renderAngoliSafariBar(pgId);
}

function renderAngoliSafariBar(pgId) {
  const bar=document.getElementById('angoliSafariTabs_'+pgId);
  if(!bar) return;
  const subs=angoliPgState(pgId);
  const aid=angoliActiveSubPage[pgId];
  bar.innerHTML=subs.map(s=>{

function getTodayStr() {
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

// Returns {label, isWeekend, isSatSun} for a given Date
function getDayInfo(d) {
  const dow=d.getDay(); // 0=Sun,6=Sat
  const isWeekend=dow===0||dow===6;
  const dayNames=['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
  const dayLabel=dayNames[dow];
  return{isWeekend, dayLabel, dow};
}

// Format a date as DD/MM/YYYY
function fmtDate(d) {
  return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
}

// Days diff between two Date objects (ignoring time)
function daysDiff(d1, d2) {
  const ms=d2.getTime()-d1.getTime();
  return Math.round(ms/86400000);
}

// Parse YYYY-MM-DD → Date at noon local to avoid DST issues
function parseLocalDate(str) {
  if(!str) return null;
  const [y,m,d]=str.split('-').map(Number);
  return new Date(y,m-1,d,12,0,0);
}

// Core Gann angle calculation using calendar days (Gann method)
// Given origin price Po at date D0 and an angle ratio R (price units per day),
// the price on angle R after N calendar days = (√Po + sign * R * N)²
// We find: given current price Pc at current date Dc,
// for each angle, the date when that angle's price = Pc.
// Also show the angle price at Dc (how many days elapsed since D0).
function updateAngoliSub(pgId,subId) {
  const subs=angoliPgState(pgId);
  const sub=subs.find(s=>s.id===subId);
  if(!sub) return;

  // Read inputs
  const originEl=document.getElementById('angoliOrigin_'+pgId+'_'+subId);
  const originDateEl=document.getElementById('angoliOriginDate_'+pgId+'_'+subId);
  const currentEl=document.getElementById('angoliCurrent_'+pgId+'_'+subId);
  const currentDateEl=document.getElementById('angoliCurrentDate_'+pgId+'_'+subId);

  const origin=parseFloat(originEl?.value||'');
  const originDateStr=originDateEl?.value||'';
  const current=parseFloat(currentEl?.value||'');
  const currentDateStr=currentDateEl?.value||'';

  if(!isNaN(origin)) sub.origin=origin; else sub.origin=null;
  sub.originDate=originDateStr||null;
  if(!isNaN(current)) sub.current=current; else sub.current=null;
  sub.currentDate=currentDateStr||null;

  // Update safari bar label
  if(sub.origin!=null) sub.label=fmtPrice(sub.origin);
  renderAngoliSafariBar(pgId);

  const container=document.getElementById('angoliContainer_'+pgId+'_'+subId);
  if(!container) return;

  if(!sub.origin||!sub.originDate) {
    container.innerHTML='<div class="empty-msg"><strong>∠</strong>Inserisci prezzo e data di origine</div>';
    if(!_angoliSkipSave) saveAll(); return;
  }

  const D0=parseLocalDate(sub.originDate);
  if(!D0) { container.innerHTML='<div class="empty-msg">Data origine non valida</div>'; if(!_angoliSkipSave) saveAll(); return; }

  const today=new Date(); today.setHours(12,0,0,0);
  const refDate=sub.currentDate?parseLocalDate(sub.currentDate):today;
  const daysElapsed=daysDiff(D0,refDate);
  const sqOrigin=Math.sqrt(sub.origin);
  const dir=sub.dir||'up';
  const sign=dir==='up'?1:-1;

  // For each angle, compute:
  // 1. Price today (at daysElapsed)
  // 2. If current price given: the date when the angle MEETS the current price
  const currentDateD=sub.currentDate?parseLocalDate(sub.currentDate):null;

  // Gann scale: for Gold ~3000, √3000 ≈ 54.77
  // 1 "unit" on the fan = 1 point of √price per day.
  // In practice this would be too fast for Gold. Gann used fractional units.
  // We expose a "1 day = 1 degree = 1 unit" which means ratio is in √price-units/day.
  // The ratios (8,4,2,1,0.5,0.25,0.125) are multiplied by a normalisation so that
  // 1×1 at 365 days completes exactly one 360° revolution of the Square.
  // For price, the step is: the angular speed in √price space.
  // Since there's no universal scale (Gann used $1/day for Wheat), we use a
  // self-calibrating scale: 1 full revolution (360°) = 365 days and the
  // angular distance is √origin (i.e. one full ring of the Square of 9).
  // So: 1×1 advances √origin / 365 per day in √price space.
  const unitPerDay = sqOrigin / 365; // 1×1 speed in √price / day

  const levels = GANN_ANGLES.map(a => {
    const speed = sign * a.ratio * unitPerDay; // √price per day
    // Price at daysElapsed
    const sqAtRef = sqOrigin + speed * daysElapsed;
    const priceAtRef = sqAtRef > 0 ? sqAtRef * sqAtRef : 0;
    // Date when angle hits current price (if provided)
    let targetDate = null;
    let daysToTarget = null;
    if(sub.current != null && sub.current > 0) {
      const sqCurrent = Math.sqrt(sub.current);
      // sqOrigin + speed * N = sqCurrent → N = (sqCurrent - sqOrigin) / speed
      if(Math.abs(speed) > 1e-10) {
        const N = (sqCurrent - sqOrigin) / speed;
        if(N >= 0) {
          const tgt = new Date(D0.getTime() + N * 86400000);
          tgt.setHours(12,0,0,0);
          targetDate = tgt;
          daysToTarget = daysDiff(today, tgt);
        }
      }
    }
    return { ...a, priceAtRef, targetDate, daysToTarget, speed };
  });

  // Sort by price at ref (descending)
  levels.sort((a,b) => b.priceAtRef - a.priceAtRef);

  // Info bar
  const daysStr = daysElapsed >= 0 ? `+${daysElapsed}gg` : `${daysElapsed}gg`;
  const dirLabel = dir==='up' ? 'dal bottom (resistenze)' : 'dal top (supporti)';

  let infoHTML = `<div class="angoli-info-bar">
    <span><span style="color:#d4a030;font-weight:700;">Origine:</span> ${fmtPrice(sub.origin)} — ${fmtDate(D0)}</span>
    <span><span style="color:#d4a030;font-weight:700;">Ref:</span> ${fmtDate(refDate)} (${daysStr})</span>
    <span style="color:#555;">${dirLabel}</span>
  </div>`;

  let html = infoHTML;

  levels.forEach(l => {
    // Filter: if futureOnly is on and targetDate is in the past → skip
    if(sub.futureOnly && l.targetDate && l.daysToTarget < 0) return;
    if(sub.futureOnly && !l.targetDate && sub.current != null) return; // angle won't meet current price going this direction

    const forceTag = {max:'force-max',high:'force-high',med:'force-med',low:'force-low'}[l.force];
    const diffFromRef = sub.current != null ? (l.priceAtRef - sub.current) : null;
    const diffStr = diffFromRef != null ? ((diffFromRef>=0?'+':'')+diffFromRef.toFixed(2)) : '';
    const pct = sub.current != null ? (diffFromRef/sub.current*100).toFixed(2) : null;

    // Date badge
    let dateBadgeHTML = '';
    if(l.targetDate) {
      const info = getDayInfo(l.targetDate);
      let daysCls = 'today';
      let daysLabel = 'oggi';
      if(l.daysToTarget > 0) { daysCls='future'; daysLabel=`fra ${l.daysToTarget}gg`; }
      else if(l.daysToTarget < 0) { daysCls='past'; daysLabel=`${Math.abs(l.daysToTarget)}gg fa`; }
      const weekendBadge = info.isWeekend ? `<span class="angoli-weekend-tag">${info.dayLabel} → trading adj.</span>` : '';
      dateBadgeHTML = `<div class="angoli-date-badge">
        <span style="font-size:10px;color:#555;">${info.dayLabel}</span>
        <span class="angoli-date-txt">${fmtDate(l.targetDate)}</span>
        <span class="angoli-days-txt ${daysCls}">${daysLabel}</span>
        ${weekendBadge}
      </div>`;
    } else if(sub.current != null) {
      dateBadgeHTML = `<div class="angoli-date-badge"><span class="angoli-date-txt" style="color:#555;">Nessun incrocio in questa direzione</span></div>`;
    }

    const isPast = l.targetDate && l.daysToTarget < 0;
    html += `<div class="angoli-card ${l.cls}${isPast?' past':''}">
      <div class="angoli-price">${fmtPrice(l.priceAtRef)}</div>
      <div class="angoli-meta">
        <div class="angoli-name">${l.name}</div>
        <div class="angoli-sub">${l.desc}</div>
        ${diffStr?`<div class="angoli-sub" style="margin-top:1px;color:${diffFromRef>=0?'#4acc4a':'#e05555'};">${diffStr} (${(diffFromRef>=0?'+':'')+pct}%) da prezzo attuale</div>`:''}
        ${dateBadgeHTML}
      </div>
      <span class="angoli-force ${forceTag}">${{max:'★★★',high:'★★',med:'★',low:'○'}[l.force]}</span>
    </div>`;
  });

  if(html === infoHTML) {
    html += '<div class="empty-msg" style="margin-top:0;"><strong>∠</strong>Nessun angolo futuro da mostrare.<br><span style="font-size:12px;color:#555;">Disattiva "Solo futuri" per vedere tutto.</span></div>';
  }

  container.innerHTML = html;
  if(!_angoliSkipSave) saveAll();
}
