// VIBRAZIONE DEL TITOLO (tab Vibrazione)
// Gann: every market has a natural vibration number.
// Derived from: √High - √Low → this is the "vibration unit".
// Then from any significant low, future resistance = (√Low + n*unit)²
// for n = 1, 2, 3... These are the natural price targets.
// ═══════════════════════════════════════════════════════════
function vibrUsePivot(pgId){
  // Ora il prezzo attuale viene dal widget globale in cima — funzione mantenuta per compatibilità
}
function toggleVibrPin(price,pgId){
  const s=pgState(pgId);
  if(!s.vibrPins)s.vibrPins=[];
  const idx=s.vibrPins.findIndex(p=>Math.abs(p-price)<0.0001);
  if(idx>=0)s.vibrPins.splice(idx,1); else s.vibrPins.push(price);
  updateVibr(pgId); saveAll();
}
function updateVibr(pgId){
  const s=pgState(pgId);
  const highEl=document.getElementById('vibrHigh_'+pgId);
  const lowEl=document.getElementById('vibrLow_'+pgId);
  // Prezzo attuale viene dal widget globale in cima
  const globalEl=document.getElementById('globalPriceInput_'+pgId);
  const high=parseFloat(highEl?.value||'');
  const low=parseFloat(lowEl?.value||'');
  const curr=parseFloat(globalEl?.value||'');
  // Only update saved state when we have a valid number — don't null out while typing
  if(!isNaN(high))s.vibrHigh=high;
  if(!isNaN(low))s.vibrLow=low;
  if(!isNaN(curr))s.vibrCurrent=curr; else if((globalEl?.value||'')==='') s.vibrCurrent=null;
  const container=document.getElementById('vibrContainer_'+pgId);
  const resultBox=document.getElementById('vibrResultBox_'+pgId);
  const vibrNumEl=document.getElementById('vibrNum_'+pgId);
  if(!container)return;
  // Need both fields valid and High > Low to compute
  if(!s.vibrHigh||!s.vibrLow){
    if(resultBox)resultBox.style.display='none';
    container.innerHTML='<div class="empty-msg"><strong>≋</strong>Inserisci top e bottom storici<br>per calcolare la vibrazione</div>';
    saveAll();return;
  }
  if(s.vibrHigh<=s.vibrLow){
    // Don't wipe results — user may still be typing the High field
    saveAll();return;
  }
  // Core Gann vibration calculation
  const sqHigh=Math.sqrt(s.vibrHigh);
  const sqLow=Math.sqrt(s.vibrLow);
  const vibUnit=sqHigh-sqLow; // vibration unit in square root space
  // Show vibration number
  if(resultBox){resultBox.style.display='';}
  if(vibrNumEl){vibrNumEl.textContent=vibUnit.toFixed(4);}

  // Generate levels: from √Low, add multiples of vibUnit
  // Upward projections from Low (resistances)
  // Downward from High (supports)
  const levels=[];
  // Frazioni: quarti già esistenti + 1/8 intermedi
  // is8th=true → livello ⅛ "aggiuntivo"; isFrac=true → qualsiasi non-intero
  const fracs=[
    {f:0,      label:'',     is8th:false},
    {f:1/8,    label:'+⅛V',  is8th:true},
    {f:2/8,    label:'+¼V',  is8th:false},
    {f:3/8,    label:'+⅜V',  is8th:true},
    {f:4/8,    label:'+½V',  is8th:false},
    {f:5/8,    label:'+⅝V',  is8th:true},
    {f:6/8,    label:'+¾V',  is8th:false},
    {f:7/8,    label:'+⅞V',  is8th:true},
  ];
  for(let n=0;n<=20;n++){
    for(const {f,label,is8th} of fracs){
      const sqTarget=sqLow+(n+f)*vibUnit;
      if(sqTarget<=0)continue;
      const price=sqTarget*sqTarget;
      if(price<s.vibrLow*0.3)continue;
      if(price>s.vibrHigh*6)continue;
      const isOrigin=(n===0&&f===0);
      const isHigh=Math.abs(price-s.vibrHigh)<s.vibrHigh*0.005;
      const isFrac=f!==0;
      let strength=is8th?'8th':(isFrac?'weak':'strong');
      if(!isFrac&&n>3)strength='med';
      if(!isFrac&&n>6)strength='weak';
      const nLabel=f===0?`${n}×V`:`${n}×V${label}`;
      levels.push({price,isFrac,is8th,dir:'up',
        label:`√${fmtPrice(s.vibrLow)} + ${nLabel} = ${sqTarget.toFixed(4)}`,
        isOrigin,isHigh,strength});
    }
  }
  // Proiezioni sopra il Top
  for(let n=1;n<=5;n++){
    for(const {f,label,is8th} of fracs){
      const sqTarget=sqHigh+(n+f)*vibUnit;
      if(sqTarget<=0)continue;
      const price=sqTarget*sqTarget;
      const isFrac=f!==0;
      let strength=is8th?'8th':(isFrac?'weak':'weak');
      if(n===1&&f===0)strength='strong';
      else if(n<=2&&f===0)strength='med';
      const nLabel=f===0?`${n}V`:`${n}V${label}`;
      levels.push({price,isFrac,is8th,dir:'up-ext',
        label:`${nLabel} sopra il Top`,isOrigin:false,isHigh:false,strength});
    }
  }
  levels.sort((a,b)=>b.price-a.price);

  // Trova il livello più vicino al prezzo attuale
  let closestIdx=s.vibrCurrent!=null?0:null;
  let closestD=Infinity;
  if(s.vibrCurrent!=null){
    levels.forEach((l,i)=>{const d=Math.abs(l.price-s.vibrCurrent);if(d<closestD){closestD=d;closestIdx=i;}});
  }

  const pins=s.vibrPins||[];
  const html=levels.map((l,i)=>{
    const pinned=pins.some(p=>Math.abs(p-l.price)<0.0001);
    const isNearest=i===closestIdx&&s.vibrCurrent!=null;
    let cardCls='vibr-card';
    if(l.is8th)cardCls+=' vibr-8th';
    else if(l.isFrac)cardCls+=' vibr-frac';
    else if(l.strength==='strong')cardCls+=' vibr-strong';
    else if(l.strength==='med')cardCls+=' vibr-med';
    else cardCls+=' vibr-weak';
    if(isNearest)cardCls+=' vibr-nearest';
    if(pinned)cardCls+=' pinned-row';
    const diffStr=s.vibrCurrent!=null?(((l.price-s.vibrCurrent)>=0?'+':'')+(l.price-s.vibrCurrent).toFixed(2)):'';
    const pk=l.price.toFixed(6);
    return`<div class="${cardCls}" id="vc_${i}_${pgId}" onclick="toggleVibrPin(${pk},${pgId})">
      <div class="vibr-price">${fmtPrice(l.price)}</div>
      <div class="vibr-meta">
        <div class="vibr-label">${l.label}${isNearest?' ◀ prezzo attuale':''}</div>
        ${diffStr?`<div class="vibr-label" style="color:${l.price>=s.vibrCurrent?'#4acc4a':'#e05555'}">${diffStr}</div>`:''}
        ${l.isOrigin?'<div class="vibr-label" style="color:#d4a030;">📍 Bottom di riferimento</div>':''}
        ${l.isHigh?'<div class="vibr-label" style="color:#e05555;">📍 Top di riferimento</div>':''}
        ${pinned?'<span class="tag tag-pin">📌 PIN</span>':''}
      </div>
    </div>`;
  }).join('');
  container.innerHTML=`<div class="vibr-section-title">LIVELLI VIBRAZIONALI — unità V = ${vibUnit.toFixed(4)}</div>`+html;
  // Centra la lista sul livello più vicino al prezzo attuale
  if(closestIdx!=null){
    setTimeout(()=>{
      const el=document.getElementById('vc_'+closestIdx+'_'+pgId);
      if(el)el.scrollIntoView({block:'center',behavior:'smooth'});
    },80);
  }
  renderVibrPinNav(pgId);
  saveAll();
}

let _vibrPinIdx={};
function renderVibrPinNav(pgId){
  const slot=document.getElementById('vibrPinNavSlot_'+pgId);
  if(!slot) return;
  const s=pgState(pgId);
  const pins=[...(s.vibrPins||[])].sort((a,b)=>b-a);
  if(!pins.length){slot.innerHTML='';return;}
  slot.innerHTML=`<div class="pin-nav-bar"><span class="pin-nav-label">📌 ${pins.length} pin</span><button class="pin-nav-btn" onclick="scrollToVibrPin(${pgId},-1)">▲</button><button class="pin-nav-btn" onclick="scrollToVibrPin(${pgId},+1)">▼</button><button class="pin-nav-clear" onclick="clearVibrPins(${pgId})">✕</button></div>`;
}
function scrollToVibrPin(pgId,dir){
  const s=pgState(pgId);
  const pins=[...(s.vibrPins||[])].sort((a,b)=>b-a);
  if(!pins.length)return;
  if(_vibrPinIdx[pgId]==null)_vibrPinIdx[pgId]=0;
  _vibrPinIdx[pgId]=((_vibrPinIdx[pgId]+dir)+pins.length)%pins.length;
  const price=pins[_vibrPinIdx[pgId]];
  const container=document.getElementById('vibrContainer_'+pgId);
  if(!container)return;
  let best=null,bestD=Infinity;
  container.querySelectorAll('.vibr-card').forEach(card=>{
    const p=parseFloat(card.querySelector('.vibr-price')?.textContent||'0');
    const d=Math.abs(p-price);
    if(d<bestD){bestD=d;best=card;}
  });
  if(best)best.scrollIntoView({behavior:'smooth',block:'center'});
}
function clearVibrPins(pgId){const s=pgState(pgId);s.vibrPins=[];_vibrPinIdx[pgId]=null;updateVibr(pgId);saveAll();}

// GIORNI OPERATIVI COMEX GOLD
// Festività ufficiali CME Group (COMEX) per il Gold Futures (GC)
// Fonte: CME Group holiday schedule
// ═══════════════════════════════════════════════════════════
function getComexHolidays(year) {
  // Calcola Pasqua (algoritmo di Butcher/Meeus)
  function easterDate(y) {
    const a=y%19,b=Math.floor(y/100),c=y%100;
    const d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25);
    const g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30;
    const i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7;
    const m=Math.floor((a+11*h+22*l)/451);
    const month=Math.floor((h+l-7*m+114)/31);
    const day=((h+l-7*m+114)%31)+1;
    return new Date(y,month-1,day);
  }
  // Lunedì più vicino a una data (per festività che cadono su weekend → osservance)
  function observed(d) {
    const day=d.getDay();
    if(day===6) return new Date(d.getFullYear(),d.getMonth(),d.getDate()-1); // sab→ven
    if(day===0) return new Date(d.getFullYear(),d.getMonth(),d.getDate()+1); // dom→lun
    return d;
  }
  function nth(y,m,weekday,n) { // es. 3° lunedì di gennaio
    let d=new Date(y,m,1);
    let count=0;
    while(true){if(d.getDay()===weekday){count++;if(count===n)return d;}d=new Date(d.getFullYear(),d.getMonth(),d.getDate()+1);}
  }
  function last(y,m,weekday) { // ultimo venerdì del mese
    let d=new Date(y,m+1,0); // ultimo giorno del mese
    while(d.getDay()!==weekday)d=new Date(d.getFullYear(),d.getMonth(),d.getDate()-1);
    return d;
  }

  const easter=easterDate(year);
  const goodFriday=new Date(easter.getFullYear(),easter.getMonth(),easter.getDate()-2);

  const holidays=new Set();
  function addH(d){holidays.add(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);}

  // New Year's Day
  addH(observed(new Date(year,0,1)));
  // MLK Day: 3° lunedì gennaio
  addH(nth(year,0,1,3));
  // Presidents Day: 3° lunedì febbraio
  addH(nth(year,1,1,3));
  // Good Friday
  addH(goodFriday);
  // Memorial Day: ultimo lunedì maggio
  addH(last(year,4,1));
  // Juneteenth: 19 giugno
  if(year>=2022) addH(observed(new Date(year,5,19)));
  // Independence Day: 4 luglio
  addH(observed(new Date(year,6,4)));
  // Labor Day: 1° lunedì settembre
  addH(nth(year,8,1,1));
  // Thanksgiving: 4° giovedì novembre
  addH(nth(year,10,4,4));
  // Christmas: 25 dicembre
  addH(observed(new Date(year,11,25)));

  return holidays;
}

// Cache per non ricalcolare ogni render
const _comexHolidayCache={};
function comexHolidays(year){
  if(!_comexHolidayCache[year]) _comexHolidayCache[year]=getComexHolidays(year);
  return _comexHolidayCache[year];
}

function isTradingDay(date) {
  const dow=date.getDay();
  if(dow===0||dow===6) return false; // weekend
  const key=`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
  return !comexHolidays(date.getFullYear()).has(key);
}

// Conta giorni operativi COMEX tra due date (estremi esclusi)
function countTradingDays(from, to) {
  let count=0;
  const sign=to>from?1:-1;
  let cur=new Date(from.getFullYear(),from.getMonth(),from.getDate()+sign);
  const end=new Date(to.getFullYear(),to.getMonth(),to.getDate());
  while((sign===1&&cur<=end)||(sign===-1&&cur>=end)){
    if(isTradingDay(cur)) count+=sign;
    cur=new Date(cur.getFullYear(),cur.getMonth(),cur.getDate()+sign);
  }
  return count;
}

// Aggiunge N giorni operativi COMEX a una data di partenza
// Se il ciclo è di N giorni lavorativi, la data target è quella
// in cui si è raggiunto l'N-esimo giorno operativo dall'origine.
function addTradingDays(from, n) {
  let cur=new Date(from.getFullYear(),from.getMonth(),from.getDate());
  let count=0;
  const sign=n>=0?1:-1;
  const target=Math.abs(n);
  while(count<target){
    cur=new Date(cur.getFullYear(),cur.getMonth(),cur.getDate()+sign);
    if(isTradingDay(cur)) count++;
  }
  return cur;
}

function newCicliPage(pgId, restoreData, _skipSave) {
  if(!cicliSubCounter[pgId]) cicliSubCounter[pgId]=0;
  let subId;
  if(restoreData && restoreData.id) {
    subId = restoreData.id;
    if(subId > cicliSubCounter[pgId]) cicliSubCounter[pgId] = subId;
  } else {
    cicliSubCounter[pgId]++;
    subId = cicliSubCounter[pgId];
  }
  const data=restoreData||{};
  const sub={
    id: subId,
    label: data.label||null,
    cicliDate: data.cicliDate||null,
    cicliType: data.cicliType||'min',
    cicliFilters: new Set(data.cicliFilters||['short','med','annual','special']),
    totLav: data.totLav||false,
  };
  cicliPgState(pgId).push(sub);
  const wrap=document.getElementById('cicliPagesWrap_'+pgId);
  if(wrap){
    const div=document.createElement('div');
    div.innerHTML=buildCicliSubHTML(pgId,subId);
    wrap.appendChild(div.firstChild);
  }
  cicliActiveSubPage[pgId]=subId;
  renderCicliSafariBar(pgId);
  switchCicliSubPage(pgId,subId);
  // Restore inputs
  if(sub.cicliDate){const el=document.getElementById('cicliDate_'+pgId+'_'+subId);if(el)el.value=sub.cicliDate;}
  const tlEl=document.getElementById('cicliTotLav_'+pgId+'_'+subId);
  if(tlEl) tlEl.checked=sub.totLav||false;
  updateCicliFiltersUI(pgId,subId);
  setCicliType(sub.cicliType,pgId,subId,true);
  _cicliSkipSave=!!_skipSave;
  updateCicli(pgId,subId);
  _cicliSkipSave=false;
  if(!_skipSave) saveAll();
  return subId;
}

function closeCicliPage(pgId, subId) {
  const subs=cicliPgState(pgId);
  if(subs.length<=1) return;
  const idx=subs.findIndex(s=>s.id===subId);
  subs.splice(idx,1);
  document.getElementById('cicli-pg_'+pgId+'_'+subId)?.remove();
  const next=subs[Math.min(idx,subs.length-1)];
  if(next) switchCicliSubPage(pgId,next.id);
  renderCicliSafariBar(pgId);
  saveAll();
}

function switchCicliSubPage(pgId, subId) {
  cicliActiveSubPage[pgId]=subId;
  const subs=cicliPgState(pgId);
  subs.forEach(s=>{
    const el=document.getElementById('cicli-pg_'+pgId+'_'+s.id);
    if(el){el.style.opacity=s.id===subId?'1':'0';el.style.pointerEvents=s.id===subId?'all':'none';}
  });
  renderCicliSafariBar(pgId);
}

function renderCicliSafariBar(pgId) {
  const bar=document.getElementById('cicliSafariTabs_'+pgId);
  if(!bar) return;
  const subs=cicliPgState(pgId);
  const aid=cicliActiveSubPage[pgId];
  bar.innerHTML=subs.map(s=>{
    const lbl=s.label||(s.cicliDate?s.cicliDate.split('-').reverse().slice(0,2).join('/'):'Data');
    const isAct=s.id===aid;
    return`<div class="stab${isAct?' active':''}" id="cicli-stab_${pgId}_${s.id}" onclick="switchCicliSubPage(${pgId},${s.id})">
      <span class="stab-label">${lbl}</span>
      <button class="stab-x" onclick="event.stopPropagation();closeCicliPage(${pgId},${s.id})">✕</button>

}

function setCicliType(type, pgId, subId, silent) {
  const subs=cicliPgState(pgId);
  const sub=subs.find(s=>s.id===subId);
  if(!sub) return;
  sub.cicliType=type;
  document.getElementById('cicliTypeMin_'+pgId+'_'+subId)?.classList.toggle('active-dir', type==='min');
  document.getElementById('cicliTypeMax_'+pgId+'_'+subId)?.classList.toggle('active-dir', type==='max');
  if(!silent){ updateCicli(pgId,subId); saveAll(); }
}

function toggleCicliFilter(cat, pgId, subId){
  const subs=cicliPgState(pgId);
  const sub=subs.find(s=>s.id===subId);
  if(!sub) return;
  if(sub.cicliFilters.has(cat)) sub.cicliFilters.delete(cat);
  else sub.cicliFilters.add(cat);
  if(!sub.cicliFilters.size) sub.cicliFilters.add('short');
  updateCicliFiltersUI(pgId,subId);
  updateCicli(pgId,subId); saveAll();
}

function updateCicliFiltersUI(pgId, subId){
  const subs=cicliPgState(pgId);
  const sub=subs.find(s=>s.id===subId);
  if(!sub) return;
  ['short','med','annual','special'].forEach(cat=>{
    const el=document.getElementById('cicliF-'+cat+'_'+pgId+'_'+subId);
    if(el) el.classList.toggle('on', sub.cicliFilters.has(cat));
  });
}

// setCicliType / toggleCicliFilter / updateCicliFiltersUI — moved to cicli sub-page system above

function updateCicli(pgId, subId){
  const subs=cicliPgState(pgId);
  const sub=subs.find(s=>s.id===subId);
  if(!sub) return;

  const dateEl=document.getElementById('cicliDate_'+pgId+'_'+subId);
  const dateStr=dateEl?.value||'';
  sub.cicliDate=dateStr||null;
  // aggiorna label tab
  const lbl=sub.cicliDate?sub.cicliDate.split('-').reverse().slice(0,2).join('/'):'Data';
  sub.label=lbl;
  renderCicliSafariBar(pgId);

  const container=document.getElementById('cicliContainer_'+pgId+'_'+subId);
  if(!container) return;

  if(!sub.cicliDate){
    container.innerHTML='<div class="empty-msg"><strong>◷</strong>Inserisci una data di origine<br>per proiettare i cicli di Gann</div>';
    if(!_cicliSkipSave) saveAll(); return;
  }

  const [y,m,d]=sub.cicliDate.split('-').map(Number);
  const origin=new Date(y,m-1,d,12,0,0);
  const today=new Date(); today.setHours(12,0,0,0);
  const todayMs=today.getTime();

  const catMeta={
    short: {label:'Breve',  color:'#6ac46a'},
    med:   {label:'Medio',  color:'#6fa3e0'},
    annual:{label:'Annuale',color:'#d4a030'},
    special:{label:'Speciale',color:'#a07add'},
  };

  const visible=GANN_CYCLES.filter(c=>sub.cicliFilters.has(c.cat));
  if(!visible.length){container.innerHTML='<div class="empty-msg">Nessun ciclo selezionato</div>';if(!_cicliSkipSave)saveAll();return;}

  const totLavEl=document.getElementById('cicliTotLav_'+pgId+'_'+subId);
  const useTotLav=totLavEl&&totLavEl.checked;
  sub.totLav=useTotLav;

  const maxMs = todayMs + 10*365.25*86400000;
  const rows=[];
  visible.forEach(c=>{
    let mult=1;
    while(true){
      let target;
      if(useTotLav){
        target=addTradingDays(origin, c.days*mult);
      } else {
        target=new Date(origin.getTime()+c.days*mult*86400000);
      }
      if(target.getTime()>maxMs) break;
      const diffDays=Math.round((target.getTime()-todayMs)/86400000);
      rows.push({...c, target, diffDays, mult});
      mult++;
    }
  });
  rows.sort((a,b)=>a.target-b.target);

  const html=rows.map(r=>{
    const isPast=r.diffDays<0;
    const isToday=Math.abs(r.diffDays)<=1;
    const isSoon=r.diffDays>0&&r.diffDays<=14;
    let cardCls=`cicli-card cat-${r.cat}`;
    let daysCls='cicli-days';
    if(isToday){cardCls+=' today';daysCls+=' today';}
    else if(isPast){cardCls+=' past';daysCls+=' past';}
    else if(isSoon){cardCls+=' soon';daysCls+=' soon';}
    else{cardCls+=' future';daysCls+=' future';}
    const dLabel=isToday?'OGGI':isPast?`${Math.abs(r.diffDays)}gg fa`:`fra ${r.diffDays}gg`;
    const cm=catMeta[r.cat]||{label:r.cat,color:'#888'};
    const weekday=['Dom','Lun','Mar','Mer','Gio','Ven','Sab'][r.target.getDay()];
    const dStr=`${String(r.target.getDate()).padStart(2,'0')}/${String(r.target.getMonth()+1).padStart(2,'0')}/${r.target.getFullYear()}`;
    const multLabel=r.mult>1?`<span style="font-size:9px;font-weight:900;color:#555;margin-left:3px;">×${r.mult}</span>`:'';
    let lavLabel='';
    if(useTotLav){
      const tradDays=countTradingDays(today,r.target);
      const absT=Math.abs(tradDays);
      if(isPast) lavLabel=`<span style="font-size:9px;font-weight:800;color:#444;margin-top:1px;">${absT} lav fa</span>`;
      else if(isToday) lavLabel=`<span style="font-size:9px;font-weight:800;color:#4acc4a;margin-top:1px;">oggi</span>`;
      else lavLabel=`<span style="font-size:9px;font-weight:800;color:#6fa3e0;margin-top:1px;">fra ${absT} lav</span>`;
    }
    return`<div class="${cardCls}">
      <div class="cicli-meta">
        <div class="cicli-name" style="display:flex;align-items:center;gap:4px;">${r.name}${multLabel}</div>
        <div class="cicli-desc">${r.desc}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;">
        <div class="cicli-date">${weekday} ${dStr}</div>
        <div style="display:flex;align-items:center;gap:4px;justify-content:flex-end;">
          <span style="font-size:9px;font-weight:800;color:${cm.color};letter-spacing:.3px;opacity:.8;">${cm.label}</span>
          <div class="${daysCls}">${dLabel}</div>
        </div>
        ${lavLabel}
      </div>
    </div>`;
  }).join('');

  container.innerHTML=html;
  setTimeout(()=>{
    const cards=container.querySelectorAll('.cicli-card:not(.past)');
    if(cards.length) cards[0].scrollIntoView({block:'start',behavior:'smooth'});
  },80);
  if(!_cicliSkipSave) saveAll();
}

// ── COMPRESSIONE: JSON → base64 semplice (affidabile, nessun LZ rotto) ──
window.LZ = (function(){
  function compress(s) {
    if(!s) return '';
    try { return btoa(unescape(encodeURIComponent(s))); } catch(_){ return btoa(s); }
  }
  function decompress(s) {
    if(!s) return '';
    try { return decodeURIComponent(escape(atob(s))); } catch(_){ return ''; }
  }
  return {compress,decompress};
})();

// ── SALVATAGGIO via JSONP GET chunked ────────────────────────────────────
// Divide il payload in chunk da 4000 char (safe per tutti i browser/server).
// GAS riassembla i chunk e salva su Drive.
window.CHUNK_SIZE = 4000;

function jsonpSaveChunk(url, chunk, idx, total, sessionId) {
  var sep = url.includes('?') ? '&' : '?';
  var fetchUrl = url + sep
    + 'action=chunk'
    + '&sid=' + encodeURIComponent(sessionId)
    + '&idx=' + idx
    + '&tot=' + total
    + '&d=' + encodeURIComponent(chunk)
    + '&t=' + Date.now();
  return fetch(fetchUrl)
    .then(function(r) { return r.json(); })
    .then(function(d) { return d.ok ? 'ok' : 'error'; })
    .catch(function() { return 'error'; });
}

async function syncToSheets() {
  const url = getSheetsUrl();
  if(!url) return;
  setSyncStatus('sync', 'Salvataggio...');
  const payload = buildPayload();
  const compressed = LZ.compress(payload);
  try {
    const r = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ c: compressed })
    });
    const d = await r.json();
    if(d.ok) {
      setSyncStatus('ok', 'Salvato ✓');
      setTimeout(()=>setSyncStatus('idle','☁️ Sheets'), 3000);
    } else {
      setSyncStatus('error', 'Errore');
    }
  } catch(e) {
    setSyncStatus('error', 'Errore rete');
  }
}

function forceSyncToSheets() { syncToSheets(); }

// ── LETTURA via JSONP GET (unico modo per leggere la risposta cross-origin su Safari) ──
function jsonpGet(url) {
  return fetch(url + (url.includes('?') ? '&' : '?') + 't=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(d) { return JSON.stringify(d); });
}

async function restoreFromSheets() {
  const url = getSheetsUrl();
  if(!url) return false;
  setSyncStatus('sync', 'Caricamento...');
  try {
    const text = await jsonpGet(url);
    let data;
    try { data = typeof text === 'object' ? text : JSON.parse(text); }
    catch(pe) { throw new Error('JSON non valido: ' + String(text).slice(0,80)); }
    // Supporta sia payload compresso (data.c) che legacy non compresso
    let payload = null;
    if(data && data.c) {
      const decompressed = LZ.decompress(data.c);
      try { payload = JSON.parse(decompressed); } catch(_) {}
    } else if(data && data.sq9v2_pages) {
      payload = data;
    }
    if(payload && payload.sq9v2_pages) {
      localStorage.setItem('sq9v2_pages',   payload.sq9v2_pages);
      localStorage.setItem('sq9v2_active',  payload.sq9v2_active  || '0');
      localStorage.setItem('sq9v2_counter', payload.sq9v2_counter || '0');
      if(payload.sq9v2_micro) localStorage.setItem('sq9v2_micro', payload.sq9v2_micro);
      setSyncStatus('ok', 'Ripristinato ✓');
      return true;
    }
    setSyncStatus('idle', '☁️ Vuoto');
    return false;
  } catch(e) {
    setSyncStatus('error', 'Errore rete');
    console.warn('restoreFromSheets error:', e);
    return false;
  }
}

async function testConnection() {
  const url = getSheetsUrl();
  if(!url) { alert('Nessun URL configurato'); return; }
  setSyncStatus('sync', 'Test...');
  try {
    const text = await jsonpGet(url);
    alert('Risposta server:\n' + String(text).slice(0, 200));
    setSyncStatus('ok', 'OK');
  } catch(e) {
    alert('Errore: ' + e.message);
    setSyncStatus('error', 'Fallito');
  }
}

async function manualRestore() {
  const ok = await restoreFromSheets();
  if(ok) {
    setTimeout(()=>location.reload(), 800);
  } else {
    setSyncStatus('error', 'Nessun dato cloud');
    setTimeout(()=>setSyncStatus('idle','☁️ Sheets'), 3000);
  }
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
function bootApp() {
  const didRestore = loadAll();
  if(!didRestore || Object.keys(pages).length===0) {
    newPage();
  } else {
    renderSafariBar();
    switchPageTo(activePgId);
    Object.keys(pages).forEach(id => {
      const pgId=parseInt(id);
      updateFilterUI(pgId);
      updateSogliaUI(pgId);
      renderConfPivots(pgId);
      updateLevels(pgId);
      renderConfPinNav(pgId);
      renderConfPagesChips(pgId);
      renderConfAngoliPagesChips(pgId);
      updateConf(pgId);
      updateNatSqFiltersUI(pgId);
      const _saved=JSON.parse(localStorage.getItem('sq9v2_pages')||'{}');
      const savedSubs=_saved[pgId]?.angoliSubPages||[];
      if(savedSubs.length>0){
        savedSubs.forEach(subData=>{ newAngoliPage(pgId, subData, true); });
        const savedActive=_saved[pgId]?.angoliActiveSubPage;
        if(savedActive) switchAngoliSubPage(pgId,savedActive);
        // Force render of active sub-page
        const activeSub=angoliActiveSub(pgId);
        if(activeSub) updateAngoliSub(pgId,activeSub.id);
      }
      const savedCicliSubs=_saved[pgId]?.cicliSubPages||[];
      if(savedCicliSubs.length>0){
        savedCicliSubs.forEach(subData=>{ newCicliPage(pgId, subData, true); });
        const savedCicliActive=_saved[pgId]?.cicliActiveSubPage;
        if(savedCicliActive) switchCicliSubPage(pgId,savedCicliActive);
        // Force render of active sub-page
        const activeCicliSub=cicliActiveSub(pgId);
        if(activeCicliSub) updateCicli(pgId,activeCicliSub.id);
      }
      switchTab(pages[pgId].currentTab, pgId);
      applySettingsVisibility(pgId);
    });
    saveAll();
  }
  // Show status if Sheets connected
  const url = getSheetsUrl();
  if(url) setSyncStatus('idle','☁️ Sheets');
}

// Avvio immediato — mai bloccare l'UI
bootApp();

// Poi prova a ripristinare da Sheets in background (solo se localStorage vuoto)
(async function init() {
  const hasLocal = !!localStorage.getItem('sq9v2_pages');
  const hasSheets = !!getSheetsUrl();
  if(hasSheets) setSyncStatus('idle','☁️ Sheets');
  if(!hasLocal && hasSheets) {
    const restored = await restoreFromSheets();
    if(restored) {
      setTimeout(()=>location.reload(), 600);
      return;
    }
  }
  _syncEnabled = true;
})();
</script>
